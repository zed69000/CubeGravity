y-content:center;color:#fff;text-shadow:0 1px 0 #000}.swatch.active{outline:3px solid var(--yellow);z-index:2}.previewBox{width:180px;height:180px;background:#071235;border:3px solid #29e7ff;border-radius:14px;margin:8px auto 16px;display:flex;align-items:center;justify-content:center}#preview{width:160px;height:160px;image-rendering:pixelated;background:#071235}textarea{min-height:250px;font-family:monospace;font-size:11px}small{color:#aab6e8;line-height:1.35;display:block}@media(max-width:980px){main{grid-template-columns:1fr}#grid{grid-template-columns:repeat(16,22px);grid-template-rows:repeat(16,22px)}.cell{width:22px;height:22px}}

<body>
<header><h1><span>GRAVITY</span> <span>CUBE</span> Asset Editor 256</h1><div class="row"><button id="copyBtn">Copier JSON</button><button id="downloadBtn" class="primary">Télécharger assets.json</button></div></header>
<main>
<section class="panel"><label>Asset</label><select id="assetSelect"></select><label>Outil</label><div class="row"><button id="drawBtn" class="active">Draw</button><button id="fillBtn">Fill zone</button><button id="eraserBtn">Gomme</button></div><div class="row" style="margin-top:8px"><button id="undoBtn">Undo</button><button id="mirrorBtn">Miroir H</button><button id="clearBtn" class="warn">Clear</button></div><div class="row" style="margin-top:8px"><button id="fillAllBtn">Remplir tout</button><button id="duplicateOnOff">Copier ON/OFF</button></div><label>Couleur active <span id="colorLabel"></span></label><div id="palette"></div><label>Importer assets.json</label><input id="fileInput" type="file" accept=".json,application/json"><p><small>Palette 256 couleurs : clés <b>00..FF</b>, avec <b>00 = noir</b> et <b>.</b> = transparent. <b>Draw</b> peint, <b>Fill zone</b> remplit une zone fermée, <b>Remplir tout</b> remplit tout l’asset. Oui, il fallait un bouton Draw. On vient d’inventer le feu.</small></p></section>
<section class="panel"><div id="grid"></div></section>
<section class="panel"><label>Aperçu 40×40</label><div class="previewBox"><canvas id="preview" width="16" height="16"></canvas></div><label>JSON courant</label><textarea id="jsonView" spellcheck="false"></textarea><div class="row" style="margin-top:8px"><button id="applyJson">Appliquer JSON texte</button></div></section>
</main>

let pack=JSON.parse(JSON.stringify(defaultPack));
let currentAsset='player'; let currentKey='10'; let toolMode='draw'; let mouseDown=false; let undoStack=[];
const assetSelect=document.getElementById('assetSelect'), paletteEl=document.getElementById('palette'), gridEl=document.getElementById('grid'), preview=document.getElementById('preview'), ctx=preview.getContext('2d'), jsonView=document.getElementById('jsonView'), colorLabel=document.getElementById('colorLabel');
function size(){return pack.assetSize||16}
function blankRow(){return Array.from({length:size()},()=>'.')}
function ensureRows(name){ if(!pack.assets[name])pack.assets[name]=Array.from({length:size()},blankRow); pack.assets[name]=pack.assets[name].map(r=>{let a=Array.isArray(r)?r.slice():String(r||'').split(''); while(a.length<size())a.push('.'); return a.slice(0,size()).map(x=>String(x));}); while(pack.assets[name].length<size())pack.assets[name].push(blankRow()); pack.assets[name]=pack.assets[name].slice(0,size()); }
function pushUndo(){ensureRows(currentAsset); undoStack.push(JSON.stringify(pack.assets[currentAsset])); if(undoStack.length>80)undoStack.shift();}
function undo(){const s=undoStack.pop(); if(!s)return; pack.assets[currentAsset]=JSON.parse(s); render();}
function setMode(m){toolMode=m; ['draw','fill','erase'].forEach(x=>document.getElementById(x==='erase'?'eraserBtn':x+'Btn')?.classList.toggle('active',x===m));}
function rebuildAssetSelect(){assetSelect.innerHTML=''; Object.keys(pack.assets).forEach(name=>{const o=document.createElement('option');o.value=name;o.textContent=name;assetSelect.appendChild(o);}); if(!pack.assets[currentAsset])currentAsset=Object.keys(pack.assets)[0]; assetSelect.value=currentAsset;}
function rebuildPalette(){paletteEl.innerHTML=''; const keys=['.'].concat(Array.from({length:256},(_,i)=>i.toString(16).toUpperCase().padStart(2,'0'))); keys.forEach(k=>{if(!(k in pack.palette))return; const v=pack.palette[k]; const b=document.createElement('div'); b.className='swatch'+(k===currentKey?' active':''); b.textContent=k; b.title=k+' = '+v; b.style.background=v==='transparent'?'repeating-conic-gradient(#777 0% 25%,#333 0% 50%) 50%/8px 8px':v; b.onclick=()=>{currentKey=k;rebuildPalette();renderColorLabel();}; paletteEl.appendChild(b);});}
function renderColorLabel(){colorLabel.textContent='('+currentKey+' = '+(pack.palette[currentKey]||'?')+')'}
function put(x,y,k){const rows=pack.assets[currentAsset].map(r=>r.slice()); rows[y][x]=k; pack.assets[currentAsset]=rows;}
function floodFill(x,y,k){ensureRows(currentAsset); const rows=pack.assets[currentAsset].map(r=>r.slice()); const target=rows[y][x]; if(target===k)return; const q=[[x,y]]; rows[y][x]=k; while(q.length){const [cx,cy]=q.shift(); for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){const nx=cx+dx, ny=cy+dy; if(nx<0||ny<0||nx>=size()||ny>=size())continue; if(rows[ny][nx]!==target)continue; rows[ny][nx]=k; q.push([nx,ny]);}} pack.assets[currentAsset]=rows;}
function applyAt(x,y,first=false){ensureRows(currentAsset); if(first)pushUndo(); if(toolMode==='fill')floodFill(x,y,currentKey); else put(x,y,toolMode==='erase'?'.':currentKey); render();}
function renderGrid(){ensureRows(currentAsset); gridEl.innerHTML=''; const rows=pack.assets[currentAsset]; for(let y=0;y<size();y++)for(let x=0;x<size();x++){const c=document.createElement('div'); const key=rows[y][x]; c.className='cell'; c.style.background=pack.palette[key]&&pack.palette[key]!=='transparent'?pack.palette[key]:'#151a34'; c.onpointerdown=e=>{mouseDown=true; try{c.setPointerCapture(e.pointerId)}catch(_){} applyAt(x,y,true); e.preventDefault();}; c.onpointerenter=()=>{if(mouseDown&&toolMode!=='fill')applyAt(x,y,false)}; gridEl.appendChild(c);}}
function renderPreview(){ensureRows(currentAsset); ctx.clearRect(0,0,16,16); const rows=pack.assets[currentAsset]; for(let y=0;y<16;y++)for(let x=0;x<16;x++){const key=rows[y][x]; const col=pack.palette[key]; if(!col||col==='transparent')continue; ctx.fillStyle=col; ctx.fillRect(x,y,1,1);}}
function renderJson(){jsonView.value=JSON.stringify(pack,null,2)} function render(){renderGrid();renderPreview();renderJson();}
function download(){const blob=new Blob([JSON.stringify(pack,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='assets.json'; a.click(); URL.revokeObjectURL(a.href);}
window.addEventListener('pointerup',()=>mouseDown=false); window.addEventListener('pointercancel',()=>mouseDown=false); window.addEventListener('blur',()=>mouseDown=false);
assetSelect.onchange=()=>{currentAsset=assetSelect.value; undoStack=[]; render();}; document.getElementById('drawBtn').onclick=()=>setMode('draw'); document.getElementById('fillBtn').onclick=()=>setMode('fill'); document.getElementById('eraserBtn').onclick=()=>setMode('erase'); document.getElementById('undoBtn').onclick=undo; document.getElementById('mirrorBtn').onclick=()=>{pushUndo(); pack.assets[currentAsset]=pack.assets[currentAsset].map(r=>r.slice().reverse()); render();}; document.getElementById('clearBtn').onclick=()=>{pushUndo(); pack.assets[currentAsset]=Array.from({length:16},blankRow); render();}; document.getElementById('fillAllBtn').onclick=()=>{pushUndo(); pack.assets[currentAsset]=Array.from({length:16},()=>Array.from({length:16},()=>currentKey)); render();}; document.getElementById('downloadBtn').onclick=download; document.getElementById('copyBtn').onclick=async()=>{await navigator.clipboard.writeText(JSON.stringify(pack,null,2)); alert('JSON copié.')}; document.getElementById('applyJson').onclick=()=>{try{const data=JSON.parse(jsonView.value); if(!data.assets||!data.palette)throw new Error('Format invalide'); pack=data; rebuildAssetSelect(); rebuildPalette(); render();}catch(e){alert('JSON invalide : '+e.message)}}; document.getElementById('fileInput').onchange=async e=>{const f=e.target.files[0]; if(!f)return; try{const data=JSON.parse(await f.text()); if(!data.assets||!data.palette)throw new Error('Format invalide'); pack=data; rebuildAssetSelect(); rebuildPalette(); render();}catch(err){alert('Import impossible : '+err.message)}}; document.getElementById('duplicateOnOff').onclick=()=>{pushUndo(); if(currentAsset.endsWith('_off')){const t=currentAsset.replace('_off','_on'); pack.assets[t]=pack.assets[currentAsset].map(r=>r.slice()); currentAsset=t;} else if(currentAsset.endsWith('_on')){const t=currentAsset.replace('_on','_off'); pack.assets[t]=pack.assets[currentAsset].map(r=>r.slice()); currentAsset=t;} else alert('Utile surtout pour button_on/button_off.'); rebuildAssetSelect(); render();};
window.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault();undo();}});
rebuildAssetSelect(); rebuildPalette(); renderColorLabel(); render();
</script>
