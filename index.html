<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#070a2a">
<title>Date Cube Gravity</title>
<style>
:root{--pink:#ff4fa0;--pink2:#ff7dbd;--cyan:#29e7ff;--white:#f8fbff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 12%,rgba(86,24,110,.65),transparent 35%),radial-gradient(circle at 15% 75%,rgba(0,210,255,.24),transparent 35%),radial-gradient(circle at 90% 82%,rgba(255,70,160,.22),transparent 34%),linear-gradient(180deg,#090b35 0%,#06091f 62%,#020414 100%);color:white;font-family:Inter,Arial,sans-serif}
body{display:flex;align-items:center;justify-content:center}
.mainMenu{position:relative;width:min(100vw,680px);height:100svh;min-height:620px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(18px,4svh,48px) 22px calc(18px + env(safe-area-inset-bottom));gap:clamp(12px,2svh,22px)}
.title{text-align:center;line-height:.9;margin-top:-1svh;filter:drop-shadow(0 18px 18px rgba(0,0,0,.38))}
.title .date{display:block;font-weight:1000;font-size:clamp(54px,13vw,102px);letter-spacing:.03em;color:var(--pink);text-shadow:0 7px 0 #7d1d54,0 0 18px rgba(255,79,160,.55),0 0 36px rgba(255,79,160,.25)}
.title .line{display:flex;justify-content:center;gap:clamp(12px,4vw,30px);white-space:nowrap}
.title .cube,.title .gravity{display:inline-block;font-weight:1000;font-size:clamp(45px,10.8vw,86px);letter-spacing:.01em}
.title .cube{color:var(--white);text-shadow:0 7px 0 #11162f,0 0 14px rgba(255,255,255,.25)}
.title .gravity{color:var(--cyan);text-shadow:0 7px 0 #06385d,0 0 24px rgba(41,231,255,.45)}
.subtitle{margin-top:2px;font-size:clamp(20px,4.8vw,31px);font-weight:950;text-align:center;color:#fff2fb;text-shadow:0 4px 12px rgba(0,0,0,.38),0 0 12px rgba(255,155,215,.18)}
.subtitle .dateWord{color:var(--pink2)}
.hero{width:min(56vw,340px);max-width:360px;min-width:220px;aspect-ratio:1/1;position:relative;display:grid;place-items:center;margin:clamp(2px,1svh,14px) 0 clamp(4px,1svh,12px)}
.heroGlow{position:absolute;width:115%;height:92%;bottom:0;border-radius:50%;background:radial-gradient(circle at 50% 70%,rgba(255,82,185,.9) 0%,rgba(255,82,185,.34) 35%,transparent 68%);filter:blur(18px);opacity:.86}
.portal{position:absolute;bottom:3%;width:58%;height:8%;border-radius:50%;background:radial-gradient(circle,#fff 0%,#ffb6df 16%,#ff52b6 44%,rgba(255,82,182,.12) 72%,transparent 100%);box-shadow:0 0 32px rgba(255,82,182,.72)}
.cubeHead{position:relative;width:78%;height:78%;border-radius:13%;background:linear-gradient(180deg,#ffe64f 0%,#ffd233 56%,#edae19 100%);box-shadow:inset 0 5px 0 rgba(255,255,195,.5),inset 0 -10px 0 rgba(143,84,0,.28),0 24px 48px rgba(0,0,0,.35),0 0 22px rgba(255,81,174,.35);overflow:hidden}
.cubeHead::before{content:"";position:absolute;left:0;top:0;bottom:0;width:15%;background:linear-gradient(180deg,#b36a05,#964900)}
.cubeHead::after{content:"";position:absolute;left:0;right:0;top:0;height:25%;background:#9f5c06;border-bottom-left-radius:22px;border-bottom-right-radius:22px;box-shadow:inset 0 4px 0 rgba(255,226,169,.32)}
.drip{position:absolute;top:0;width:27%;height:30%;background:#9f5c06;border-radius:0 0 55% 55%;z-index:2}
.drip.d1{left:10%}.drip.d2{left:37%}.drip.d3{left:64%}
.eye{position:absolute;top:39%;z-index:3;width:27%;height:27%;border-radius:50%;background:#fff;border:9px solid #452000;box-shadow:inset 0 -4px 0 rgba(0,0,0,.06)}
.eye.left{left:19%}.eye.right{right:19%}
.eye::after{content:"";position:absolute;left:54%;top:52%;transform:translate(-50%,-50%);width:31%;height:31%;border-radius:50%;background:#060606}
.mouth{position:absolute;left:24%;right:24%;bottom:22%;z-index:3;height:10%;border-radius:999px;background:#8b4a00;border:4px solid #653400;box-shadow:inset 0 3px 0 rgba(255,190,98,.3)}
.shine{position:absolute;left:29%;right:13%;top:5%;height:6%;z-index:4;border-radius:999px;background:rgba(255,230,160,.45)}
.buttonStack{width:100%;display:flex;flex-direction:column;align-items:center;gap:15px}
.playBtn,.optionBtn{position:relative;border:0;text-decoration:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:16px;color:#fff;font-weight:1000;letter-spacing:.04em;text-shadow:0 3px 0 rgba(0,0,0,.2);transition:transform .12s ease,filter .12s ease}
.playBtn{width:min(78vw,430px);min-height:78px;padding:20px 30px;border-radius:33px;font-size:clamp(31px,7vw,48px);background:linear-gradient(180deg,#ff85c4 0%,#ff4d98 55%,#e73382 100%);box-shadow:0 0 34px rgba(255,77,152,.38),0 15px 30px rgba(0,0,0,.3),inset 0 4px 0 rgba(255,255,255,.38),inset 0 -6px 0 rgba(143,0,65,.32)}
.optionBtn{width:min(58vw,315px);min-height:58px;padding:15px 24px;border-radius:24px;font-size:clamp(20px,4.8vw,30px);background:linear-gradient(180deg,#2b2a67 0%,#121a4e 100%);box-shadow:0 0 24px rgba(140,70,255,.22),0 12px 22px rgba(0,0,0,.28),inset 0 0 0 2px rgba(139,102,255,.28),inset 0 3px 0 rgba(255,255,255,.16),inset 0 -5px 0 rgba(0,0,0,.22)}
.playBtn:active,.optionBtn:active{transform:translateY(2px) scale(.99)}
.playBtn:hover,.optionBtn:hover{filter:brightness(1.06)}
.iconHeart{font-size:1.08em;filter:drop-shadow(0 2px 0 rgba(0,0,0,.16))}
.iconGear{font-size:1.02em}
.version{font-weight:800;font-size:clamp(12px,2.5vw,15px);letter-spacing:.04em;color:rgba(238,245,255,.48);text-align:center;margin-top:2px}
.optionsOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(0,0,0,.58);z-index:10}
.optionsOverlay.show{display:flex}
.optionsModal{width:min(92vw,390px);padding:22px;border-radius:26px;background:linear-gradient(180deg,#161a4a,#080d2d);box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.1)}
.optionsModal h2{margin:0 0 14px;text-align:center;font-size:30px}
.optionsModal a,.optionsModal button{display:block;width:100%;border:0;text-decoration:none;margin-top:10px;padding:15px 16px;border-radius:18px;background:#202866;color:#fff;font-weight:900;text-align:center;font-size:16px}
.optionsModal .creator{background:#141f50}
.optionsModal .close{background:#34395d;cursor:pointer}
@media(max-height:720px){.mainMenu{gap:10px;padding-top:18px;padding-bottom:16px}.hero{width:min(44vw,250px);min-width:185px}.playBtn{min-height:62px;padding:14px 24px;border-radius:26px}.optionBtn{min-height:50px;padding:12px 22px}}
</style>
</head>
<body>
<main class="mainMenu">
<section class="title" aria-label="Date Cube Gravity"><span class="date">DATE</span><div class="line"><span class="cube">CUBE</span><span class="gravity">GRAVITY</span></div></section>
<div class="subtitle">À la recherche de son <span class="dateWord">Date</span> !</div>
<section class="hero" aria-hidden="true"><div class="heroGlow"></div><div class="portal"></div><div class="cubeHead"><div class="shine"></div><div class="drip d1"></div><div class="drip d2"></div><div class="drip d3"></div><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div></section>
<nav class="buttonStack" aria-label="Navigation principale"><a class="playBtn" href="game.html"><span class="iconHeart">🤍</span><span>JOUER</span></a><button class="optionBtn" id="openOptions" type="button"><span class="iconGear">⚙</span><span>OPTIONS</span></button><div class="version">V43.25-mainmenu-clean</div></nav>
</main>
<div class="optionsOverlay" id="optionsOverlay" aria-hidden="true"><div class="optionsModal" role="dialog" aria-modal="true" aria-labelledby="optionsTitle"><h2 id="optionsTitle">Options</h2><a href="game.html">Mode joueur</a><a class="creator" href="game.html?editor=1">Mode créateur</a><a class="creator" href="asset_svg_editor.html">Éditeur d’assets</a><button class="close" id="closeOptions" type="button">Fermer</button></div></div>
<script>
const overlay=document.getElementById("optionsOverlay");
document.getElementById("openOptions").addEventListener("click",()=>{overlay.classList.add("show");overlay.setAttribute("aria-hidden","false")});
document.getElementById("closeOptions").addEventListener("click",()=>{overlay.classList.remove("show");overlay.setAttribute("aria-hidden","true")});
overlay.addEventListener("click",e=>{if(e.target===overlay){overlay.classList.remove("show");overlay.setAttribute("aria-hidden","true")}});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){overlay.classList.remove("show");overlay.setAttribute("aria-hidden","true")}});
</script>
</body>
</html>
