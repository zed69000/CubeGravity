<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Date Cube Gravity</title>
  <style>
    :root{
      --bg:#070d35;
      --panel:#111a46;
      --cyan:#29e7ff;
      --yellow:#ffd640;
      --pink:#ff4f93;
      --white:#ffffff;
      --brown:#a56500;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 25%, rgba(41,231,255,.18), transparent 34%),
        radial-gradient(circle at 70% 70%, rgba(255,79,147,.16), transparent 38%),
        var(--bg);
      color:var(--white);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      touch-action:manipulation;
      user-select:none;
    }
    .menu{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(92vw,520px);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:22px;
      text-align:center;
    }
    h1{
      margin:0;
      font-size:clamp(34px,8vw,72px);
      line-height:.88;
      letter-spacing:-.06em;
      text-transform:uppercase;
      text-shadow:0 8px 0 rgba(0,0,0,.22);
    }
    .subtitle{
      margin:0;
      opacity:.82;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:13px;
    }
    .faceButton{
      width:min(66vw,280px);
      aspect-ratio:1;
      border:0;
      background:transparent;
      padding:0;
      cursor:pointer;
      filter:drop-shadow(0 24px 26px rgba(0,0,0,.38));
      animation:floaty 1.9s ease-in-out infinite;
      transform-origin:50% 55%;
    }
    .faceButton:active{
      transform:scale(.94) rotate(-2deg);
      animation:none;
    }
    .faceButton svg{
      width:100%;
      height:100%;
      display:block;
      overflow:visible;
    }
    .faceButton.vectorReady .fallbackFace{
      display:none;
    }
    .faceButton .vectorFaceSvg{
      filter:drop-shadow(0 2px 0 rgba(0,0,0,.18));
    }
    .mouth{
      animation:mouth 1.15s ease-in-out infinite;
      transform-origin:center;
    }
    .pupil{
      animation:look 1.7s ease-in-out infinite;
    }
    .hair{
      animation:hair 1.2s ease-in-out infinite alternate;
      transform-origin:center;
    }
    .click{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:12px 18px;
      border:3px solid rgba(255,255,255,.24);
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:var(--yellow);
      font-weight:950;
      font-size:clamp(20px,5vw,34px);
      letter-spacing:-.03em;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 12px 30px rgba(0,0,0,.24);
      animation:pulse 1.15s ease-in-out infinite;
    }
    .buildVersion{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.18);
      color:rgba(255,255,255,.82);
      font-size:12px;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      opacity:.85;
      font-size:13px;
    }
    .links a{
      color:#8df8ff;
      text-decoration:none;
      border-bottom:1px solid rgba(141,248,255,.35);
    }
    @keyframes floaty{
      0%,100%{transform:translateY(0) rotate(-1deg)}
      50%{transform:translateY(-12px) rotate(1deg)}
    }
    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.045)}
    }
    @keyframes mouth{
      0%,100%{transform:scaleX(1)}
      50%{transform:scaleX(1.45)}
    }
    @keyframes look{
      0%,100%{transform:translateX(-2px)}
      50%{transform:translateX(3px)}
    }
    @keyframes hair{
      from{transform:translateY(0)}
      to{transform:translateY(-2px)}
    }


    /* ===== V43.21 romantic polished menu ===== */
    :root{
      --date-pink:#ff4f93;
      --date-pink-2:#ff8fc2;
      --date-cyan:#29e7ff;
      --date-yellow:#ffd640;
      --date-deep:#050720;
    }
    html,body{
      background:
        radial-gradient(circle at 50% 18%, rgba(255,79,147,.24), transparent 30%),
        radial-gradient(circle at 28% 72%, rgba(41,231,255,.16), transparent 36%),
        radial-gradient(circle at 76% 68%, rgba(255,214,64,.11), transparent 28%),
        linear-gradient(180deg,#090b35 0%,#030412 78%)!important;
    }
    .menu::before,
    .menu::after{
      content:"";
      position:fixed;
      inset:auto;
      width:280px;
      height:280px;
      border-radius:50%;
      pointer-events:none;
      filter:blur(8px);
      opacity:.24;
    }
    .menu::before{left:-110px;top:12%;background:var(--date-cyan)}
    .menu::after{right:-120px;bottom:8%;background:var(--date-pink)}
    .card{
      position:relative;
      width:min(94vw,620px);
      gap:18px;
      padding:20px 18px 18px;
      border-radius:34px;
      background:linear-gradient(180deg,rgba(10,16,60,.38),rgba(5,8,28,.10));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 28px 70px rgba(0,0,0,.34), inset 0 0 0 1px rgba(41,231,255,.05);
      backdrop-filter:blur(3px);
    }
    h1{
      font-family:monospace;
      font-size:clamp(38px,9vw,86px);
      line-height:.88;
      letter-spacing:-.075em;
      text-shadow:0 7px 0 rgba(0,0,0,.38),0 0 22px rgba(41,231,255,.24);
    }
    .titleDate{color:var(--date-pink);text-shadow:0 0 20px rgba(255,79,147,.55),0 7px 0 rgba(0,0,0,.38)}
    .titleCube{color:#fff}
    .titleGravity{color:var(--date-cyan);text-shadow:0 0 20px rgba(41,231,255,.48),0 7px 0 rgba(0,0,0,.38)}
    .subtitle{
      opacity:1;
      color:#ffe7f3;
      font-size:clamp(15px,3.5vw,24px);
      letter-spacing:.01em;
      text-transform:none;
      font-weight:950;
      text-shadow:0 3px 0 rgba(0,0,0,.35),0 0 12px rgba(255,79,147,.30);
      margin-top:-4px;
    }
    .subtitle strong{color:var(--date-pink-2)}
    .faceWrap{
      position:relative;
      width:min(68vw,292px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      margin:4px 0 0;
    }
    .faceWrap::before{
      content:"";
      position:absolute;
      inset:8%;
      border-radius:32px;
      background:radial-gradient(circle,rgba(255,79,147,.28),transparent 62%);
      filter:blur(16px);
      animation:heartGlow 2.4s ease-in-out infinite;
    }
    .faceButton{
      width:100%;
      position:relative;
      z-index:2;
    }
    .heartOrbit{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:3;
    }
    .heartOrbit span{
      position:absolute;
      display:grid;
      place-items:center;
      width:34px;
      height:34px;
      border-radius:50%;
      color:#ffd1eb;
      font-size:22px;
      text-shadow:0 3px 0 rgba(0,0,0,.38),0 0 12px rgba(255,79,147,.72);
      animation:heartFloat 2.2s ease-in-out infinite;
    }
    .heartOrbit span:nth-child(1){left:4%;top:18%;animation-delay:-.1s;color:#ff8fc2}
    .heartOrbit span:nth-child(2){right:3%;top:15%;animation-delay:-.7s;color:#ffd1eb}
    .heartOrbit span:nth-child(3){left:10%;bottom:12%;animation-delay:-1.1s;color:#ff4f93}
    .heartOrbit span:nth-child(4){right:9%;bottom:10%;animation-delay:-1.5s;color:#fff}
    .heartOrbit span:nth-child(5){left:50%;top:-2%;transform:translateX(-50%);animation-delay:-.35s;color:#ffd640}
    .click{
      margin-top:2px;
      color:#06101d;
      background:linear-gradient(180deg,#ffd1eb,#ff7db6);
      border:3px solid rgba(255,255,255,.45);
      box-shadow:0 14px 30px rgba(255,79,147,.24), inset 0 2px 0 rgba(255,255,255,.55);
      text-transform:uppercase;
      font-size:clamp(16px,4.2vw,28px);
    }
    .buildVersion{
      position:fixed;
      right:12px;
      bottom:calc(10px + env(safe-area-inset-bottom));
      z-index:20;
      background:rgba(5,8,28,.72);
      color:rgba(255,255,255,.72);
      border:1px solid rgba(255,255,255,.14);
      font-size:11px;
    }
    .links{
      margin-top:-4px;
    }
    .links a{
      color:#dffbff;
      background:rgba(41,231,255,.08);
      border:1px solid rgba(41,231,255,.22);
      padding:8px 11px;
      border-radius:999px;
      text-decoration:none;
    }
    @keyframes heartFloat{
      0%,100%{transform:translateY(0) scale(1) rotate(-6deg)}
      50%{transform:translateY(-10px) scale(1.12) rotate(7deg)}
    }
    @keyframes heartGlow{
      0%,100%{opacity:.55;transform:scale(.96)}
      50%{opacity:.95;transform:scale(1.04)}
    }
    @media(max-width:700px){
      .card{padding:16px 12px 14px;border-radius:26px;gap:14px}
      .faceWrap{width:min(74vw,258px)}
      .heartOrbit span{width:28px;height:28px;font-size:19px}
      .buildVersion{right:8px;bottom:calc(8px + env(safe-area-inset-bottom));font-size:10px}
    }

  </style>
</head>
<body>
  <main class="menu" id="startZone" aria-label="Menu principal">
    <section class="card">
      <h1><span class="titleDate">Date</span><br><span class="titleCube">Cube</span> <span class="titleGravity">Gravity</span></h1>
      <p class="subtitle">À la recherche de son <strong>Date</strong> !</p>
      <div class="buildVersion">V43.21-date-menu-polish</div>

      <div class="faceWrap" aria-label="Tête de cube ^^">
        <div class="heartOrbit" aria-hidden="true">
          <span>♥</span><span>♡</span><span>💖</span><span>♥</span><span>✦</span>
        </div>
        <button class="faceButton" id="playFace" aria-label="Lancer le jeu">
          <svg viewBox="0 0 40 40" role="img" aria-label="Tête du personnage">
            <rect x="4" y="8" width="32" height="29" rx="2" fill="#a56500" stroke="#6b3f00" stroke-width="2"/>
            <rect x="4" y="4" width="32" height="30" rx="2" fill="#ffd640" stroke="#a56500" stroke-width="4"/>
            <circle class="hair" cx="8" cy="8" r="3" fill="#a56500" stroke="#a66500" stroke-width="2"/>
            <circle class="hair" cx="15" cy="8" r="3" fill="#a56500" stroke="#a66500" stroke-width="2"/>
            <circle class="hair" cx="25" cy="8" r="3" fill="#a56500" stroke="#a66500" stroke-width="2"/>
            <circle class="hair" cx="32" cy="8" r="3" fill="#a56500" stroke="#a66500" stroke-width="2"/>
            <rect x="10" y="13" width="9" height="9" rx="5" fill="#fff" stroke="#422600" stroke-width="1"/>
            <rect x="23" y="14" width="9" height="9" rx="5" fill="#fff" stroke="#422600" stroke-width="1"/>
            <rect class="pupil" x="14" y="17" width="3" height="3" rx="3" fill="#111"/>
            <rect class="pupil" x="27" y="17" width="3" height="3" rx="3" fill="#111"/>
            <rect class="mouth" x="12" y="24" width="16" height="3" rx="2" fill="#a56500" stroke="#6b3f00" stroke-width="1"/>
            <rect x="13" y="3" width="22" height="2" rx="1" fill="rgba(255,255,255,.25)"/>
          </svg>
        </button>
      </div>

      <div class="click">Tête de cube ^^</div>

      <nav class="links">
        <a href="game.html">Lancer sans grimace</a>
        <a href="#" id="openOptions">Options</a>
      </nav>
    </section>
  </main>

  <script>
    const BUILD_VERSION = "V43.21-date-menu-polish";

    function startGame(){
      window.location.href = "game.html";
    }

    function svgEl(name, attrs = {}){
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for(const [k,v] of Object.entries(attrs)){
        if(v !== undefined && v !== null) el.setAttribute(k, String(v));
      }
      return el;
    }

    function pointsToPath(points){
      if(!Array.isArray(points) || !points.length) return "";
      return points.map((p,i)=>`${i?"L":"M"} ${p[0]} ${p[1]}`).join(" ") + " Z";
    }

    function layerBBox(layer){
      if(!layer) return {x:0,y:0,w:0,h:0};
      if(layer.shape === "circle"){
        const r = Number(layer.r || 0);
        return {x:Number(layer.x||0)-r,y:Number(layer.y||0)-r,w:r*2,h:r*2};
      }
      if(layer.shape === "polygon" || layer.shape === "path"){
        const pts = Array.isArray(layer.points) ? layer.points : [];
        if(!pts.length) return {x:0,y:0,w:0,h:0};
        const xs = pts.map(p=>Number(p[0]||0));
        const ys = pts.map(p=>Number(p[1]||0));
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        return {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
      }
      if(layer.shape === "text"){
        const fs = Number(layer.fontSize || 12);
        const w = String(layer.text || "").length * fs * .6;
        return {x:Number(layer.x||0)-w/2,y:Number(layer.y||0)-fs,w,h:fs};
      }
      return {x:Number(layer.x||0),y:Number(layer.y||0),w:Number(layer.w||10),h:Number(layer.h||10)};
    }

    function appendLayer(parent, layer){
      if(!layer || layer.visible === false) return;
      let el;
      if(layer.shape === "circle"){
        el = svgEl("circle", {cx:layer.x ?? 20, cy:layer.y ?? 20, r:layer.r ?? 8});
      }else if(layer.shape === "polygon"){
        el = svgEl("polygon", {points:(layer.points || []).map(p=>Array.isArray(p)?p.join(","):p).join(" ")});
      }else if(layer.shape === "path"){
        el = svgEl("path", {d:layer.d || pointsToPath(layer.points)});
      }else if(layer.shape === "text"){
        el = svgEl("text", {x:layer.x ?? 20, y:layer.y ?? 20, "font-size":layer.fontSize ?? 12, "font-weight":900, "font-family":"monospace", "text-anchor":"middle"});
        el.textContent = layer.text || "";
      }else{
        el = svgEl("rect", {x:layer.x ?? 0, y:layer.y ?? 0, width:layer.w ?? 10, height:layer.h ?? 10, rx:layer.rx ?? 0, ry:layer.ry ?? layer.rx ?? 0});
      }

      el.setAttribute("fill", layer.fill ?? "transparent");
      el.setAttribute("stroke", layer.stroke ?? "transparent");
      el.setAttribute("stroke-width", layer.strokeWidth ?? 0);
      el.setAttribute("opacity", layer.opacity ?? 1);
      el.setAttribute("pointer-events", "none");

      const transforms = [];
      const hasScale = Number.isFinite(Number(layer.scaleX)) || Number.isFinite(Number(layer.scaleY));
      const hasRot = Number.isFinite(Number(layer.rotation));
      if(hasScale || hasRot){
        const bb = layerBBox(layer);
        const cx = Number(layer.pivotX ?? (bb.x + bb.w / 2));
        const cy = Number(layer.pivotY ?? (bb.y + bb.h / 2));
        const sx = Number.isFinite(Number(layer.scaleX)) ? Number(layer.scaleX) : 1;
        const sy = Number.isFinite(Number(layer.scaleY)) ? Number(layer.scaleY) : 1;
        const rot = Number.isFinite(Number(layer.rotation)) ? Number(layer.rotation) : 0;
        transforms.push(`translate(${cx} ${cy})`);
        if(rot) transforms.push(`rotate(${rot})`);
        if(sx !== 1 || sy !== 1) transforms.push(`scale(${sx} ${sy})`);
        transforms.push(`translate(${-cx} ${-cy})`);
      }
      if(transforms.length) el.setAttribute("transform", transforms.join(" "));
      parent.appendChild(el);
    }

    function groupBBox(group, layers){
      const boxes = (group.children || [])
        .map(id => layers.find(l => l.id === id))
        .filter(Boolean)
        .map(layerBBox);
      if(!boxes.length) return {x:20,y:20,w:0,h:0};
      const minX = Math.min(...boxes.map(b=>b.x));
      const minY = Math.min(...boxes.map(b=>b.y));
      const maxX = Math.max(...boxes.map(b=>b.x+b.w));
      const maxY = Math.max(...boxes.map(b=>b.y+b.h));
      return {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
    }

    function groupTransform(group, bb){
      const tx = Number(group.tx || 0), ty = Number(group.ty || 0);
      const sx = Number.isFinite(Number(group.scaleX)) ? Number(group.scaleX) : 1;
      const sy = Number.isFinite(Number(group.scaleY)) ? Number(group.scaleY) : 1;
      const rot = Number.isFinite(Number(group.rotation)) ? Number(group.rotation) : 0;
      if(!tx && !ty && !rot && sx === 1 && sy === 1) return "";
      const px = Number(group.pivotX ?? (bb.x + bb.w / 2));
      const py = Number(group.pivotY ?? (bb.y + bb.h / 2));
      const parts = [];
      if(tx || ty) parts.push(`translate(${tx} ${ty})`);
      parts.push(`translate(${px} ${py})`);
      if(rot) parts.push(`rotate(${rot})`);
      if(sx !== 1 || sy !== 1) parts.push(`scale(${sx} ${sy})`);
      parts.push(`translate(${-px} ${-py})`);
      return parts.join(" ");
    }

    function renderVectorPlayer(assetPack){
      const player = assetPack?.assets?.player;
      if(!player || !Array.isArray(player.layers)) return false;

      const faceButton = document.getElementById("playFace");
      const canvasSize = assetPack.canvasSize || 40;
      const svg = svgEl("svg", {viewBox:`0 0 ${canvasSize} ${canvasSize}`, role:"img", "aria-label":"Tête du personnage", class:"vectorFaceSvg"});
      const layers = player.layers;
      const groups = Array.isArray(player.groups) ? player.groups : [];
      const childToGroup = new Map();
      groups.forEach(g => (g.children || []).forEach(id => childToGroup.set(id,g)));
      const renderedGroups = new Set();

      layers.forEach(layer => {
        if(!layer || layer.visible === false) return;
        const group = childToGroup.get(layer.id);
        if(group){
          if(renderedGroups.has(group.id)) return;
          renderedGroups.add(group.id);
          const bb = groupBBox(group, layers);
          const gEl = svgEl("g", {"data-vector-group":group.id});
          const tr = groupTransform(group, bb);
          if(tr) gEl.setAttribute("transform", tr);
          layers.forEach(child => {
            if(child && child.visible !== false && (group.children || []).includes(child.id)) appendLayer(gEl, child);
          });
          svg.appendChild(gEl);
        }else{
          appendLayer(svg, layer);
        }
      });

      faceButton.innerHTML = "";
      faceButton.appendChild(svg);
      faceButton.classList.add("vectorReady");
      return true;
    }

    async function syncMenuFaceWithGameAsset(){
      const files = ["vector_assets_runtime.json", "vector_assets.json"];
      for(const file of files){
        try{
          const res = await fetch(file + "?v=" + Date.now(), {cache:"no-store"});
          if(!res.ok) continue;
          const data = await res.json();
          if(renderVectorPlayer(data)) return;
        }catch(e){
          console.warn("[MENU FACE] Impossible de charger", file, e);
        }
      }
    }

    document.getElementById("playFace").addEventListener("click", startGame);
    document.getElementById("startZone").addEventListener("click", (e) => {
      if (e.target.closest("a")) return;
      if (e.target.closest("#playFace")) return;
      startGame();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") startGame();
    });
    syncMenuFaceWithGameAsset();
  </script>

  <div id="optionsPanel" style="position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:99;">
    <div style="background:#111a46;padding:24px;border-radius:18px;display:flex;flex-direction:column;gap:14px;min-width:280px;text-align:center;border:2px solid #29e7ff;">
      <h2 style="margin:0">Options</h2>
      <div style="font-size:12px;opacity:.8;font-weight:900;letter-spacing:.05em;">V43.21-date-menu-polish</div>
      <a href="game.html" style="color:white;text-decoration:none;padding:12px;border-radius:12px;background:#1f2b6d;">Mode Joueur</a>
      <a href="game.html?editor=1" style="color:white;text-decoration:none;padding:12px;border-radius:12px;background:#1f2b6d;">Mode Créateur</a>
      <button id="closeOptions" style="padding:12px;border:0;border-radius:12px;background:#ff4f93;color:white;font-weight:bold;">Fermer</button>
    </div>
  </div>
<script>
const optionsPanel=document.getElementById("optionsPanel");
document.getElementById("openOptions")?.addEventListener("click",e=>{e.preventDefault();optionsPanel.style.display="flex";});
document.getElementById("closeOptions")?.addEventListener("click",()=>optionsPanel.style.display="none");
</script></body>
