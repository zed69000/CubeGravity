<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#070a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Date Gravity">
<link rel="manifest" href="manifest.webmanifest">
<title>Date Cube Gravity</title>
<style>
:root{
  --pink:#ff4fa0;
  --pink2:#ff7dbd;
  --cyan:#29e7ff;
  --white:#f8fbff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  min-height:100dvh;
  overflow:hidden;
  overscroll-behavior:none;
  background:
    radial-gradient(circle at 50% 12%,rgba(86,24,110,.65),transparent 35%),
    radial-gradient(circle at 15% 75%,rgba(0,210,255,.24),transparent 35%),
    radial-gradient(circle at 90% 82%,rgba(255,70,160,.22),transparent 34%),
    linear-gradient(180deg,#090b35 0%,#06091f 62%,#020414 100%);
  color:white;
  font-family:Inter,Arial,sans-serif;
}
body{
  position:fixed;
  inset:0;
  width:100vw;
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  touch-action:manipulation;
}
body::before{
  content:"";
  position:fixed;
  inset:-20%;
  pointer-events:none;
  background:
    radial-gradient(circle at 28% 26%,rgba(255,255,255,.11) 0 1px,transparent 2px),
    radial-gradient(circle at 70% 18%,rgba(255,126,190,.16) 0 1px,transparent 2px),
    radial-gradient(circle at 84% 66%,rgba(41,231,255,.14) 0 1px,transparent 2px),
    radial-gradient(circle at 20% 72%,rgba(255,255,255,.10) 0 1px,transparent 2px);
  background-size:120px 120px,170px 170px,150px 150px,210px 210px;
  animation:starDrift 18s linear infinite;
  opacity:.9;
}
@keyframes starDrift{
  from{transform:translate3d(0,0,0)}
  to{transform:translate3d(36px,28px,0)}
}
.floatingHearts{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}
.floatHeart{
  position:absolute;
  bottom:-40px;
  color:rgba(255,105,180,.72);
  font-weight:900;
  text-shadow:0 0 12px rgba(255,79,160,.45),0 5px 12px rgba(0,0,0,.35);
  animation:heartRise var(--dur) linear infinite;
  animation-delay:var(--delay);
  transform:translateX(0) scale(var(--scale));
}
@keyframes heartRise{
  0%{opacity:0;transform:translate3d(0,0,0) scale(var(--scale)) rotate(-12deg)}
  10%{opacity:.85}
  85%{opacity:.7}
  100%{opacity:0;transform:translate3d(var(--drift),-112vh,0) scale(calc(var(--scale) * 1.18)) rotate(18deg)}
}
.mainMenu{
  position:relative;
  width:min(100vw,680px);
  height:100dvh;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:clamp(18px,4svh,48px) 22px calc(18px + env(safe-area-inset-bottom));
  gap:clamp(12px,2svh,22px);
  z-index:2;
}
.title{
  text-align:center;
  line-height:.9;
  margin-top:-1svh;
  filter:drop-shadow(0 18px 18px rgba(0,0,0,.38));
}
.title .date{
  display:block;
  font-weight:1000;
  font-size:clamp(54px,13vw,102px);
  letter-spacing:.03em;
  color:var(--pink);
  text-shadow:
    0 7px 0 #7d1d54,
    0 0 18px rgba(255,79,160,.55),
    0 0 36px rgba(255,79,160,.25);
}
.title .line{
  display:flex;
  justify-content:center;
  gap:clamp(12px,4vw,30px);
  white-space:nowrap;
}
.title .cube,
.title .gravity{
  display:inline-block;
  font-weight:1000;
  font-size:clamp(45px,10.8vw,86px);
  letter-spacing:.01em;
}
.title .cube{
  color:var(--white);
  text-shadow:0 7px 0 #11162f,0 0 14px rgba(255,255,255,.25);
}
.title .gravity{
  color:var(--cyan);
  text-shadow:0 7px 0 #06385d,0 0 24px rgba(41,231,255,.45);
}
.subtitle{
  margin-top:2px;
  font-size:clamp(20px,4.8vw,31px);
  font-weight:950;
  text-align:center;
  color:#fff2fb;
  text-shadow:0 4px 12px rgba(0,0,0,.38),0 0 12px rgba(255,155,215,.18);
}
.subtitle .dateWord{color:var(--pink2)}
.hero{
  width:min(56vw,340px);
  max-width:360px;
  min-width:220px;
  aspect-ratio:1/1;
  position:relative;
  display:grid;
  place-items:center;
  margin:clamp(2px,1svh,14px) 0 clamp(4px,1svh,12px);
}
.heroGlow{
  position:absolute;
  width:115%;
  height:92%;
  bottom:0;
  border-radius:50%;
  background:radial-gradient(circle at 50% 70%,rgba(255,82,185,.9) 0%,rgba(255,82,185,.34) 35%,transparent 68%);
  filter:blur(18px);
  opacity:.86;
  animation:heroGlowPulse 2.6s ease-in-out infinite;
}
@keyframes heroGlowPulse{
  0%,100%{transform:scale(.96);opacity:.74}
  50%{transform:scale(1.05);opacity:.96}
}
.portal{
  position:absolute;
  bottom:3%;
  width:58%;
  height:8%;
  border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#ffb6df 16%,#ff52b6 44%,rgba(255,82,182,.12) 72%,transparent 100%);
  box-shadow:0 0 32px rgba(255,82,182,.72);
  animation:portalBreath 1.8s ease-in-out infinite;
}
@keyframes portalBreath{
  0%,100%{transform:scaleX(.94);filter:brightness(.92)}
  50%{transform:scaleX(1.08);filter:brightness(1.15)}
}
.heroAssetWrap{
  position:relative;
  width:78%;
  height:78%;
  border-radius:13%;
  display:grid;
  place-items:center;
  filter:
    drop-shadow(0 24px 34px rgba(0,0,0,.38))
    drop-shadow(0 0 18px rgba(255,79,160,.28));
  animation:heroBob 2.2s ease-in-out infinite;
}
@keyframes heroBob{
  0%,100%{transform:translateY(0) rotate(-1deg)}
  50%{transform:translateY(-9px) rotate(1deg)}
}
#playerHeroSvg{
  width:100%;
  height:100%;
  overflow:visible;
}
.fallbackCube{
  width:100%;
  height:100%;
  border-radius:13%;
  background:linear-gradient(180deg,#ffe64f 0%,#ffd233 56%,#edae19 100%);
  box-shadow:
    inset 0 5px 0 rgba(255,255,195,.5),
    inset 0 -10px 0 rgba(143,84,0,.28),
    0 24px 48px rgba(0,0,0,.35),
    0 0 22px rgba(255,81,174,.35);
  position:relative;
  overflow:hidden;
}
.fallbackCube::before{content:"";position:absolute;left:0;top:0;bottom:0;width:15%;background:linear-gradient(180deg,#b36a05,#964900)}
.fallbackCube::after{content:"";position:absolute;left:0;right:0;top:0;height:25%;background:#9f5c06;border-bottom-left-radius:22px;border-bottom-right-radius:22px}
.fallbackEye{position:absolute;top:39%;z-index:3;width:27%;height:27%;border-radius:50%;background:#fff;border:9px solid #452000}
.fallbackEye.left{left:19%}
.fallbackEye.right{right:19%}
.fallbackEye::after{content:"";position:absolute;left:54%;top:52%;transform:translate(-50%,-50%);width:31%;height:31%;border-radius:50%;background:#060606}
.fallbackMouth{position:absolute;left:24%;right:24%;bottom:22%;height:10%;border-radius:999px;background:#8b4a00;border:4px solid #653400}
.assetHidden{display:none}
.buttonStack{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}
.playBtn,.optionBtn{
  position:relative;
  border:0;
  text-decoration:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  color:#fff;
  font-weight:1000;
  letter-spacing:.04em;
  text-shadow:0 3px 0 rgba(0,0,0,.2);
  transition:transform .12s ease,filter .12s ease,box-shadow .12s ease;
  touch-action:manipulation;
}
.playBtn{
  width:min(78vw,430px);
  min-height:78px;
  padding:20px 30px;
  border-radius:33px;
  font-size:clamp(31px,7vw,48px);
  background:linear-gradient(180deg,#ff85c4 0%,#ff4d98 55%,#e73382 100%);
  box-shadow:
    0 0 34px rgba(255,77,152,.38),
    0 15px 30px rgba(0,0,0,.3),
    inset 0 4px 0 rgba(255,255,255,.38),
    inset 0 -6px 0 rgba(143,0,65,.32);
}
.optionBtn{
  width:min(58vw,315px);
  min-height:58px;
  padding:15px 24px;
  border-radius:24px;
  font-size:clamp(20px,4.8vw,30px);
  background:linear-gradient(180deg,#2b2a67 0%,#121a4e 100%);
  box-shadow:
    0 0 24px rgba(140,70,255,.22),
    0 12px 22px rgba(0,0,0,.28),
    inset 0 0 0 2px rgba(139,102,255,.28),
    inset 0 3px 0 rgba(255,255,255,.16),
    inset 0 -5px 0 rgba(0,0,0,.22);
}
.playBtn.isPressed,.optionBtn.isPressed,
.playBtn:active,.optionBtn:active{
  transform:translateY(4px) scale(.975);
  filter:brightness(1.16) saturate(1.08);
}
.playBtn:hover,.optionBtn:hover{filter:brightness(1.06)}
.playBtn::after,.optionBtn::after{
  content:"";
  position:absolute;
  inset:6px 18%;
  border-radius:999px;
  background:linear-gradient(180deg,rgba(255,255,255,.26),transparent);
  opacity:.75;
  pointer-events:none;
}
.iconHeart{font-size:1.08em;filter:drop-shadow(0 2px 0 rgba(0,0,0,.16))}
.iconGear{font-size:1.02em}
.version{
  font-weight:800;
  font-size:clamp(12px,2.5vw,15px);
  letter-spacing:.04em;
  color:rgba(238,245,255,.48);
  text-align:center;
  margin-top:2px;
}
.soundHint{
  position:fixed;
  right:14px;
  bottom:calc(14px + env(safe-area-inset-bottom));
  z-index:4;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,15,45,.42);
  color:rgba(255,255,255,.68);
  border-radius:999px;
  padding:8px 10px;
  font-size:12px;
  font-weight:900;
  backdrop-filter:blur(8px);
}
.optionsOverlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
  background:rgba(0,0,0,.58);
  z-index:10;
}
.optionsOverlay.show{display:flex}
.optionsModal{
  width:min(92vw,390px);
  padding:22px;
  border-radius:26px;
  background:linear-gradient(180deg,#161a4a,#080d2d);
  box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.1);
}
.optionsModal h2{margin:0 0 14px;text-align:center;font-size:30px}
.optionsModal a,.optionsModal button{
  display:block;
  width:100%;
  border:0;
  text-decoration:none;
  margin-top:10px;
  padding:15px 16px;
  border-radius:18px;
  background:#202866;
  color:#fff;
  font-weight:900;
  text-align:center;
  font-size:16px;
}
.optionsModal .creator{background:#141f50}
.optionsModal .soundToggle{background:#263066;cursor:pointer}
.optionsModal .close{background:#34395d;cursor:pointer}
@media(max-height:720px){
  .mainMenu{gap:10px;padding-top:18px;padding-bottom:16px}
  .hero{width:min(44vw,250px);min-width:185px}
  .playBtn{min-height:62px;padding:14px 24px;border-radius:26px}
  .optionBtn{min-height:50px;padding:12px 22px}
}

.heroAssetWrap{opacity:0;transition:opacity .18s ease;}
.heroAssetWrap.assetReady{opacity:1;}


/* ===== V43.21 INCLUSIVE DATE CHOICE - SHARED CHARACTER ASSETS ===== */
.thoughtTitle{
  position:relative;
  padding:clamp(18px,3svh,28px) clamp(20px,5vw,42px);
  border-radius:42% 45% 40% 44% / 38% 42% 46% 40%;
  background:rgba(255,255,255,.94);
  color:#080b2a;
  box-shadow:0 16px 32px rgba(0,0,0,.28), inset 0 -6px 0 rgba(41,231,255,.12);
  border:4px solid rgba(255,255,255,.35);
}
.thoughtTitle::before,.thoughtTitle::after{
  content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.94);box-shadow:0 7px 18px rgba(0,0,0,.18);
}
.thoughtTitle::before{width:18px;height:18px;left:28%;bottom:-18px}
.thoughtTitle::after{width:11px;height:11px;right:31%;bottom:-28px}
.thoughtTitle .date{font-size:clamp(42px,10vw,82px);text-shadow:none;color:var(--pink)}
.thoughtTitle .cube,.thoughtTitle .gravity{font-size:clamp(34px,8.2vw,68px);text-shadow:none}
.thoughtTitle .cube{color:#11162f}.thoughtTitle .gravity{color:#0787b4}
.dateChoice{
  width:min(92vw,520px);
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:clamp(8px,3vw,22px);
  margin:clamp(4px,1svh,12px) 0;
}
.choiceCard{
  position:relative;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:rgba(8,13,54,.52);
  border:1px solid rgba(255,255,255,.14);
  border-radius:24px;
  padding:10px 8px 12px;
  cursor:pointer;
  color:#fff;
  box-shadow:0 14px 26px rgba(0,0,0,.22), inset 0 0 0 1px rgba(41,231,255,.08);
  transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
}
.choiceCard:active,.choiceCard.isPressed{transform:translateY(3px) scale(.985);filter:brightness(1.1)}
.choiceLabel{font-weight:1000;font-size:clamp(16px,4.5vw,24px);letter-spacing:.02em;text-shadow:0 3px 0 rgba(0,0,0,.28)}
.choiceHint{font-size:11px;font-weight:900;color:rgba(238,245,255,.62)}
.choiceHead{width:min(32vw,148px);height:min(32vw,148px);min-width:112px;min-height:112px;position:relative;display:grid;place-items:center;filter:drop-shadow(0 18px 24px rgba(0,0,0,.35));}
.choiceHead svg{width:100%;height:100%;overflow:visible}.choiceHeadFallback{width:100%;height:100%;border-radius:16px;background:#ffd640;border:6px solid #a56500}
.choiceCard.me .choiceLabel{color:#29e7ff}.choiceCard.date .choiceLabel{color:#ff7dbd}
.loveBridge{font-size:clamp(24px,7vw,38px);font-weight:1000;color:#fff;text-shadow:0 0 18px rgba(255,79,160,.55);animation:loveBeat 1.25s ease-in-out infinite}
@keyframes loveBeat{0%,100%{transform:scale(.96)}50%{transform:scale(1.12)}}
@media(max-height:720px){.thoughtTitle{padding:12px 24px}.dateChoice{width:min(92vw,430px)}.choiceHead{width:min(26vw,116px);height:min(26vw,116px);min-width:88px;min-height:88px}.choiceHint{display:none}}



/* ===== V43.47 MAIN MENU DA + COMPOUND LAYERS =====
   Objectif : reprendre la DA très lisible du mockup généré, mais en gardant
   le style vectoriel actuel du jeu. Pas de cadre autour des personnages, pas
   de bulle de pensée, et retour d'une petite animation idle. */
.mainMenu{
  width:min(100vw,660px);
  min-height:560px;
  gap:clamp(10px,1.8svh,18px);
  padding:clamp(14px,3svh,34px) 20px calc(16px + env(safe-area-inset-bottom));
}
.mainTitle{
  position:relative;
  margin-top:0;
  display:grid;
  justify-items:center;
  line-height:.86;
  filter:drop-shadow(0 16px 18px rgba(0,0,0,.34));
  transform:rotate(-1.2deg);
}
.mainTitle::before{
  content:"";
  position:absolute;
  left:6%;right:4%;top:48%;height:20px;
  border-radius:999px;
  background:linear-gradient(90deg,transparent,rgba(255,79,160,.62),rgba(41,231,255,.5),transparent);
  filter:blur(8px);
  transform:rotate(-4deg);
  z-index:-1;
}
.mainTitle .date,
.mainTitle .gravity{
  display:block;
  font-family:"Trebuchet MS","Arial Rounded MT Bold",Arial,sans-serif;
  font-weight:1000;
  letter-spacing:.015em;
  -webkit-text-stroke:1.2px rgba(255,255,255,.28);
  paint-order:stroke fill;
}
.mainTitle .date{
  font-size:clamp(54px,15vw,106px);
  color:#ff63c6;
  text-shadow:
    0 5px 0 #7d1d54,
    0 0 14px rgba(255,99,198,.55),
    0 0 28px rgba(255,99,198,.24);
}
.mainTitle .gravity{
  margin-top:-2px;
  font-size:clamp(48px,13.2vw,94px);
  color:#3ddcff;
  text-shadow:
    0 5px 0 #06385d,
    0 0 14px rgba(61,220,255,.55),
    0 0 28px rgba(61,220,255,.22);
}
.mainTitle .gravity::before{
  content:"♥";
  display:inline-block;
  margin-right:.05em;
  font-size:.34em;
  color:#ff7dbd;
  vertical-align:middle;
  transform:translateY(-.1em) rotate(-10deg);
  text-shadow:0 0 12px rgba(255,79,160,.55);
}
.mainTitle .gravity::after{
  content:"✦";
  display:inline-block;
  margin-left:.08em;
  font-size:.26em;
  color:#ffd640;
  vertical-align:middle;
  transform:translateY(-.18em) rotate(12deg);
  text-shadow:0 0 12px rgba(255,214,64,.55);
}
.thoughtTitle,.thoughtTitle::before,.thoughtTitle::after{
  background:transparent!important;
  border:0!important;
  box-shadow:none!important;
}
.dateChoice{
  width:min(94vw,560px);
  grid-template-columns:1fr minmax(38px,.34fr) 1fr;
  gap:clamp(4px,2.4vw,18px);
  margin:clamp(0px,.6svh,8px) 0 clamp(2px,1svh,10px);
}
.choiceCard{
  background:transparent!important;
  border:0!important;
  box-shadow:none!important;
  padding:0!important;
  border-radius:0!important;
  overflow:visible;
  min-width:0;
  transform:translateZ(0);
}
.choiceCard::before,
.choiceCard::after{
  content:"";
  position:absolute;
  top:32%;
  width:22px;
  height:10px;
  border-top:4px solid currentColor;
  border-radius:50%;
  opacity:.75;
  filter:drop-shadow(0 0 8px currentColor);
}
.choiceCard.me::before{left:-4px;transform:rotate(24deg)}
.choiceCard.me::after{left:10px;top:24%;transform:rotate(4deg);width:16px}
.choiceCard.date::before{right:-4px;transform:rotate(-24deg)}
.choiceCard.date::after{right:10px;top:24%;transform:rotate(-4deg);width:16px}
.choiceCard:active,.choiceCard.isPressed{
  transform:translateY(3px) scale(.985);
  filter:brightness(1.12);
}
.choiceLabel{
  position:relative;
  z-index:2;
  font-family:"Trebuchet MS","Arial Rounded MT Bold",Arial,sans-serif;
  font-size:clamp(18px,4.9vw,26px);
  line-height:1;
  transform:rotate(-4deg);
  text-transform:uppercase;
  letter-spacing:.045em;
  text-shadow:0 3px 0 rgba(0,0,0,.35),0 0 12px currentColor;
}
.choiceCard.date .choiceLabel{transform:rotate(4deg)}
.choiceHint{display:none!important}
.choiceHead{
  width:min(35vw,162px);
  height:min(35vw,162px);
  min-width:112px;
  min-height:112px;
  margin-top:4px;
  filter:
    drop-shadow(0 18px 23px rgba(0,0,0,.36))
    drop-shadow(0 0 12px rgba(255,79,160,.20));
  transform-origin:50% 70%;
  animation:choiceIdle 2.05s ease-in-out infinite;
  will-change:transform;
}
.choiceCard.me .choiceHead{animation-name:choiceIdleMe}
.choiceCard.date .choiceHead{animation-name:choiceIdleDate;animation-delay:-.35s}
.choiceHead svg{width:100%;height:100%;overflow:visible}
.choiceHead::after{
  content:"";
  position:absolute;
  left:16%;right:16%;bottom:-8%;height:12%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,0,0,.34),rgba(0,0,0,.08) 58%,transparent 72%);
  filter:blur(3px);
  transform:scaleX(1.05);
  z-index:-1;
}
.loveBridge{
  display:grid;
  place-items:center;
  min-width:38px;
  font-size:clamp(28px,8vw,48px);
  line-height:1;
  color:#ff7dbd;
  text-shadow:0 0 18px rgba(255,79,160,.72),0 3px 0 rgba(0,0,0,.22);
}
.loveBridge::before,.loveBridge::after{
  content:"♥";
  position:absolute;
  font-size:.46em;
  opacity:.8;
  animation:miniHeartFloat 1.8s ease-in-out infinite;
}
.loveBridge::before{transform:translate(-22px,-28px) rotate(-12deg);animation-delay:-.5s}
.loveBridge::after{transform:translate(20px,28px) rotate(14deg);animation-delay:-1s}
.playBtn{
  width:min(80vw,430px);
  min-height:72px;
  background:linear-gradient(180deg,#ffd84f 0%,#ff9f1a 58%,#eb6d12 100%);
  box-shadow:
    0 0 32px rgba(255,170,28,.34),
    0 15px 30px rgba(0,0,0,.30),
    inset 0 4px 0 rgba(255,255,255,.42),
    inset 0 -7px 0 rgba(150,67,0,.24);
}
.optionBtn{
  width:min(58vw,315px);
  background:linear-gradient(180deg,#5a5bce 0%,#6a35d1 52%,#3b218b 100%);
}
.version{
  color:rgba(255,255,255,.64);
  text-shadow:0 0 10px rgba(255,79,160,.35);
}
@keyframes choiceIdleMe{
  0%,100%{transform:translateY(0) rotate(-7deg) scale(1)}
  50%{transform:translateY(-8px) rotate(-3deg) scale(1.025)}
}
@keyframes choiceIdleDate{

<script>

/* ===== V43.48 MAIN MENU IPHONE FULLSCREEN ===== */
(function(){
  const btn=document.getElementById("menuFullscreenBtn");
  const isIOS=()=>/iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
  const isStandalone=()=>window.navigator.standalone===true ||
    window.matchMedia("(display-mode: standalone)").matches ||
    window.matchMedia("(display-mode: fullscreen)").matches;

  function syncFullscreenUI(){
    const active=!!document.fullscreenElement || !!document.webkitFullscreenElement || isStandalone();
    document.body.classList.toggle("menu-fullscreen-active",active);
    if(btn)btn.style.display=active?"none":"";
  }

  async function requestMenuFullscreen(showHelp=false){
    if(isStandalone()){
      syncFullscreenUI();
      return true;
    }
    const target=document.documentElement;
    try{
      if(target.requestFullscreen){
        await target.requestFullscreen({navigationUI:"hide"});
        syncFullscreenUI();
        return true;
      }
      if(target.webkitRequestFullscreen){
        target.webkitRequestFullscreen();
        syncFullscreenUI();
        return true;
      }
    }catch(e){
      console.warn("[MAINMENU FULLSCREEN] request failed",e);
    }

    if(showHelp && isIOS()){
      const msg="Sur iPhone, pour le vrai plein écran sans barre Safari : Partager → Ajouter à l’écran d’accueil, puis lance Date Gravity depuis l’icône.";
      if(window.confirm(msg+"\n\nContinuer vers le jeu ?")){
        return false;
      }
    }
    return false;
  }

  if(btn){
    btn.addEventListener("click",()=>requestMenuFullscreen(true),{passive:true});
  }

  document.addEventListener("fullscreenchange",syncFullscreenUI);
  document.addEventListener("webkitfullscreenchange",syncFullscreenUI);
  window.addEventListener("pageshow",syncFullscreenUI);
  window.addEventListener("resize",syncFullscreenUI);

  // Sur les liens vers le jeu, on demande le fullscreen AVANT de changer de page.
  // Sinon iOS/Safari considère que la nouvelle page n'a plus le geste utilisateur. Magnifique petit piège.
  document.addEventListener("click",async(e)=>{
    const link=e.target.closest && e.target.closest('a[href^="game.html"]');
    if(!link || e.defaultPrevented)return;
    e.preventDefault();
    const href=link.getAttribute("href") || "game.html";
    await requestMenuFullscreen(false);
    setTimeout(()=>{ window.location.href=href; },60);
  },true);

  syncFullscreenUI();
})();

const overlay=document.getElementById("optionsOverlay");
const soundToggle=document.getElementById("soundToggle");
const soundHint=document.getElementById("soundHint");
const downloadProjectBtn=document.getElementById("downloadProjectBtn");
const PROJECT_ZIP_NAME="date_gravity_project_pc.zip";
const PROJECT_PASSWORD="Lulu69";

let audioCtx=null;
let menuMusicTimer=null;
let menuMusicOn=true;
let audioUnlocked=false;
let musicStep=0;

function getAudio(){
  if(!menuMusicOn)return null;
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  if(audioCtx.state==="suspended"){
    audioCtx.resume().catch(()=>{});
  }
  audioUnlocked=true;
  return audioCtx;
}

function beep(freq=440,dur=.08,type="sine",gain=.04){
  const ac=getAudio();
  if(!ac)return;
  const o=ac.createOscillator();
  const g=ac.createGain();
  const f=ac.createBiquadFilter();
  o.type=type;
  o.frequency.setValueAtTime(freq,ac.currentTime);
  f.type="lowpass";
  f.frequency.setValueAtTime(1450,ac.currentTime);
  g.gain.setValueAtTime(Math.max(.0001,gain),ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);
  o.connect(f);
  f.connect(g);
  g.connect(ac.destination);
  o.start();
  o.stop(ac.currentTime+dur+.02);
}

function playButtonSound(){
  beep(740,.045,"triangle",.035);
  setTimeout(()=>beep(980,.05,"sine",.018),45);
}

function playOpenSound(){
  beep(420,.07,"triangle",.03);
  setTimeout(()=>beep(640,.08,"sine",.02),70);
}

function playCloseSound(){
  beep(330,.07,"triangle",.025);
}

function startMenuMusic(){
  if(!menuMusicOn || menuMusicTimer)return;
  const ac=getAudio();
  if(!ac)return;
  const bass=[196,196,220,196,174.61,174.61,196,220];
  const melody=[392,440,493.88,440,392,349.23,392,440];
  const tick=()=>{
    if(!menuMusicOn)return;
    const i=musicStep++%melody.length;
    beep(bass[i],.42,"sine",.006);
    setTimeout(()=>beep(melody[i],.16,"triangle",.009),90);
    setTimeout(()=>beep(melody[(i+2)%melody.length],.14,"sine",.0045),260);
  };
  tick();
  menuMusicTimer=setInterval(tick,560);
}

function stopMenuMusic(){
  if(menuMusicTimer){
    clearInterval(menuMusicTimer);
    menuMusicTimer=null;
  }
}

function setMusicState(v){
  menuMusicOn=!!v;
  localStorage.setItem("dcg_menu_music_on",menuMusicOn?"1":"0");
  soundToggle.textContent=menuMusicOn?"♪ Musique menu : ON":"♪ Musique menu : OFF";
  soundHint.textContent=menuMusicOn?"♪ Menu":"♪ Off";
  if(menuMusicOn)startMenuMusic();
  else stopMenuMusic();
}

try{
  const saved=localStorage.getItem("dcg_menu_music_on");
  if(saved!==null)menuMusicOn=saved==="1";
}catch(e){}

setMusicState(menuMusicOn);

["pointerdown","mousedown","touchstart","keydown"].forEach(evt=>{
  window.addEventListener(evt,()=>{
    if(menuMusicOn)startMenuMusic();
  },{once:true,passive:true});
});

document.querySelectorAll(".jsReactive").forEach(el=>{
  const press=()=>{
    el.classList.add("isPressed");
    if(el.tagName!=="A")playButtonSound();
  };
  const release=()=>el.classList.remove("isPressed");
  el.addEventListener("pointerdown",press);
  el.addEventListener("mousedown",press);
  el.addEventListener("touchstart",press,{passive:true});
  el.addEventListener("pointerup",release);
  el.addEventListener("pointercancel",release);
  el.addEventListener("mouseleave",release);
  el.addEventListener("mouseup",release);
  el.addEventListener("touchend",release);
  el.addEventListener("click",()=>{
    if(menuMusicOn)startMenuMusic();
    if(el.tagName==="A")playButtonSound();
  });
});

async function tryDownloadProject(){

const SVG_NS="http://www.w3.org/2000/svg";

function svgEl(tag,attrs={}){
  const e=document.createElementNS(SVG_NS,tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(v!==undefined && v!==null && v!=="") e.setAttribute(k,String(v));
  });
  return e;
}

function layerOpacity(layer){
  if(layer.visible===false)return 0;
  if(layer.opacity===undefined || layer.opacity===null)return 1;
  return Number(layer.opacity);
}

function normalizeStroke(v){
  return (!v || v==="transparent" || v==="rgba(0,0,0,0)") ? "none" : v;
}

function applyCommon(el,layer){
  el.setAttribute("fill",layer.fill || "none");
  el.setAttribute("stroke",normalizeStroke(layer.stroke));
  if(layer.strokeWidth!==undefined)el.setAttribute("stroke-width",String(layer.strokeWidth));
  const op=layerOpacity(layer);
  if(op!==1)el.setAttribute("opacity",String(op));

  const px=Number(layer.pivotX ?? 20);
  const py=Number(layer.pivotY ?? 20);
  const tx=Number(layer.tx ?? 0);
  const ty=Number(layer.ty ?? 0);
  const sx=Number(layer.scaleX ?? 1);
  const sy=Number(layer.scaleY ?? 1);
  const rot=Number(layer.rotation ?? layer.rot ?? 0);
  const transforms=[];
  if(tx||ty)transforms.push(`translate(${tx} ${ty})`);
  if(rot)transforms.push(`rotate(${rot} ${px} ${py})`);
  if(sx!==1 || sy!==1)transforms.push(`translate(${px} ${py}) scale(${sx} ${sy}) translate(${-px} ${-py})`);
  if(transforms.length)el.setAttribute("transform",transforms.join(" "));
  return el;
}

function pointsToString(points){
  return (points||[]).map(p=>`${Number(p[0])},${Number(p[1])}`).join(" ");
}

function makePathD(points){
  if(!points || !points.length)return "";
  const first=points[0];
  let d=`M ${Number(first[0])} ${Number(first[1])}`;
  for(let i=1;i<points.length;i++)d+=` L ${Number(points[i][0])} ${Number(points[i][1])}`;
  return d;
}

function drawLayer(layer){
  if(!layer || layer.visible===false)return null;
  const shape=layer.shape;

  // V43.47 : support des layers fusionnés fidèles.
  // L'éditeur crée maintenant des layers shape:"compound" pour garder les
  // sous-formes, couleurs, strokes et arrondis. Le menu doit donc les rendre
  // récursivement au lieu de les ignorer comme un vieux grille-pain vexé.
  if(shape==="compound"){
    const g=svgEl("g",{});
    const parts=Array.isArray(layer.parts) ? layer.parts : [];
    parts.forEach(part=>{
      const childLayer=part?.layer || part;
      const child=drawLayer(childLayer);
      if(!child)return;
      if(part?.groupTransform){
        const wrap=svgEl("g",{transform:part.groupTransform});
        wrap.appendChild(child);
        g.appendChild(wrap);
      }else{
        g.appendChild(child);
      }
    });
    return applyCommon(g,layer);
  }

  let el=null;

  if(shape==="rect"){
    el=svgEl("rect",{
      x:layer.x ?? 0,
      y:layer.y ?? 0,
      width:layer.w ?? layer.width ?? 1,
      height:layer.h ?? layer.height ?? 1,
      rx:layer.rx ?? 0,
      ry:layer.ry ?? layer.rx ?? 0
    });
  }else if(shape==="circle"){
    el=svgEl("circle",{
      cx:layer.cx ?? layer.x ?? 20,
      cy:layer.cy ?? layer.y ?? 20,
      r:layer.r ?? 1
    });
  }else if(shape==="ellipse"){
    el=svgEl("ellipse",{
      cx:layer.cx ?? layer.x ?? 20,
      cy:layer.cy ?? layer.y ?? 20,
      rx:layer.rx ?? layer.w ?? 1,
      ry:layer.ry ?? layer.h ?? 1
    });
  }else if(shape==="polygon"){
    el=svgEl("polygon",{points:pointsToString(layer.points)});
  }else if(shape==="path"){
    const d=layer.d || makePathD(layer.points);
    if(!d)return null;
    el=svgEl("path",{d});
  }else if(shape==="line"){
    el=svgEl("line",{
      x1:layer.x1 ?? layer.x ?? 0,
      y1:layer.y1 ?? layer.y ?? 0,
      x2:layer.x2 ?? 40,
      y2:layer.y2 ?? 40
    });
  }else if(shape==="text"){
    el=svgEl("text",{
      x:layer.x ?? 20,
      y:layer.y ?? 20,
      "font-size":layer.fontSize ?? 16,
      "font-weight":layer.fontWeight ?? 900,
      "text-anchor":layer.textAnchor ?? "middle",
      "font-family":layer.fontFamily ?? "Arial, sans-serif"
    });
    el.textContent=layer.text || "";
  }

  if(!el)return null;
  return applyCommon(el,layer);
}


let menuVectorPack=null;
const CHARACTER_KEYS={
  me:{boy:"player_boy",girl:"player_girl",fallback:"player"},
  date:{boy:"date_boy",girl:"date_girl",fallback:"destination"}
};
const CHARACTER_LABELS={boy:"garçon",girl:"fille"};

function getStoredGender(key, fallback){
  try{
    const v=localStorage.getItem(key);
    return (v==="boy"||v==="girl") ? v : fallback;
  }catch(e){return fallback;}
}
function setStoredGender(key,value){
  try{localStorage.setItem(key,value);}catch(e){}
}
function toggleGender(value){return value==="boy" ? "girl" : "boy";}

let meGender=getStoredGender("dcg_me_gender","boy");
let dateGender=getStoredGender("dcg_date_gender","girl");

async function loadMenuVectorPack(){
  const candidates=["vector_assets_runtime.json","./vector_assets_runtime.json","vector_assets.json","./vector_assets.json"];
  for(const path of candidates){
    try{
      const res=await fetch(path+"?v="+Date.now(),{cache:"no-store"});
      if(!res.ok)continue;
      const data=await res.json();
      if(data?.assets){
        menuVectorPack=data;
        console.log("[MAINMENU] vector assets loaded from",path);
        return data;
      }
    }catch(err){console.warn("[MAINMENU] vector asset failed",path,err);}
  }
  return null;
}

function menuAsset(role,gender){
  const keys=CHARACTER_KEYS[role];
  const wanted=keys?.[gender];
  if(menuVectorPack?.assets?.[wanted])return wanted;
  if(menuVectorPack?.assets?.[keys?.fallback])return keys.fallback;
  return null;
}

function drawMenuAsset(svgId,fallbackId,assetName,flip=false){
  const svg=document.getElementById(svgId);
  const fallback=document.getElementById(fallbackId);
  if(!svg || !fallback)return;
  const asset=assetName ? menuVectorPack?.assets?.[assetName] : null;
  const layers=asset?.layers;
  svg.innerHTML="";
  if(Array.isArray(layers) && layers.length){
    const root=svgEl("g", flip?{transform:"translate(40 0) scale(-1 1)"}:{});
    layers.forEach(layer=>{
      const el=drawLayer(layer);
      if(el)root.appendChild(el);
    });
    svg.appendChild(root);
    svg.classList.remove("assetHidden");
    fallback.classList.add("assetHidden");
  }else{
    svg.classList.add("assetHidden");
    fallback.classList.remove("assetHidden");
  }
}

function updateMenuCharacters(){
  const meAsset=menuAsset("me",meGender);
  const dateAsset=menuAsset("date",dateGender);
  drawMenuAsset("meChoiceSvg","meChoiceFallback",meAsset,false);
  drawMenuAsset("dateChoiceSvg","dateChoiceFallback",dateAsset,true);
  const meHint=document.getElementById("meChoiceHint");
  const dateHint=document.getElementById("dateChoiceHint");
  if(meHint)meHint.textContent=CHARACTER_LABELS[meGender]||meGender;
  if(dateHint)dateHint.textContent=CHARACTER_LABELS[dateGender]||dateGender;
}

async function initMenuCharacters(){
  await loadMenuVectorPack();
  updateMenuCharacters();
}

const meChoiceBtn=document.getElementById("meChoice");
const dateChoiceBtn=document.getElementById("dateChoice");
if(meChoiceBtn)meChoiceBtn.addEventListener("click",()=>{
  meGender=toggleGender(meGender);
  setStoredGender("dcg_me_gender",meGender);
  playOpenSound();
  updateMenuCharacters();
});
if(dateChoiceBtn)dateChoiceBtn.addEventListener("click",()=>{
  dateGender=toggleGender(dateGender);
  setStoredGender("dcg_date_gender",dateGender);
  playOpenSound();
  updateMenuCharacters();
});

initMenuCharacters();
</script>
