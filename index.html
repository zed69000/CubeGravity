svg{width:min(94vw,68vh);height:min(94vw,68vh);background:#171827;border:4px solid #4b4e73;box-shadow:0 14px 34px #000;position:relative;z-index:1;transition:filter .25s ease}.boardWrap{position:relative;z-index:1}.electricEdge{position:absolute;inset:0;border:6px solid #ff3045;border-radius:2px;pointer-events:none;z-index:3;filter:url(#electricNoise);animation:electricPulse .45s steps(3,end) infinite;box-shadow:inset 0 0 18px #ff3045,0 0 16px #ff3045;opacity:.9}.electricEdge:after{content:"";position:absolute;inset:5px;border:2px solid rgba(255,112,36,.75);box-shadow:inset 0 0 10px #ff6a00}@keyframes electricPulse{0%{opacity:.62;filter:url(#electricNoise) brightness(1)}50%{opacity:1;filter:url(#electricNoise) brightness(1.45)}100%{opacity:.72;filter:url(#electricNoise) brightness(1.1)}}.deathPixel{position:absolute;width:7px;height:7px;background:#f1c453;z-index:18;image-rendering:pixelated;animation:deathpix .55s ease-out forwards}@keyframes deathpix{to{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}}
#controls{

#controls button{font-size:18px;padding:11px 16px}

button.active{background:#52f28a;color:#051407}#toggleEdit{background:#242638;color:#b8bddc;border:1px solid #3b3f66}#toggleEdit.active{background:#52f28a;color:#051407;border:0}.lockedWarn{color:#ff7777;font-weight:900}.testOk{color:#52f28a;font-weight:900}.testBad{color:#ff7777;font-weight:900}#lockLevel.locked{background:#ff7777;color:#210000}
#status{opacity:.9;min-height:16px}
.hidden{display:none!important}
.hitcell{pointer-events:all}
#editPanel.hidden{display:none}#editPanel{display:flex;gap:6px;flex-wrap:wrap;width:100%}
#playStats{font-weight:900;color:#f1c453}
#banner{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(5,5,10,.92);border:3px solid #fff;border-radius:18px;padding:18px 22px;text-align:center;box-shadow:0 16px 40px #000;z-index:10;min-width:240px}.danger{background:#ff5c5c!important;color:#210000!important}#confirmBox{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;background:rgba(5,5,10,.96);border:3px solid #ff7777;border-radius:18px;padding:18px;min-width:270px;max-width:88vw;text-align:center;box-shadow:0 20px 48px #000}#confirmBox.hidden{display:none}#confirmBox h2{margin:0 0 8px;font-size:20px}#confirmBox p{font-size:13px;line-height:1.35}#confirmBox .row{display:flex;gap:8px;justify-content:center;margin-top:12px}#banner.lose{background:rgba(5,5,10,.58);border-color:rgba(255,255,255,.55);backdrop-filter:blur(3px)}#banner.lose{background:rgba(5,5,10,.58);border-color:rgba(255,255,255,.55);backdrop-filter:blur(3px)}
#banner.hidden{display:none}
#bannerTitle{font-size:26px;font-weight:900;margin-bottom:6px}

#stars{font-size:34px;margin-top:8px;letter-spacing:4px;color:#ff7fb3;text-shadow:0 0 10px rgba(255,127,179,.35);font-weight:900}#bannerAction{margin-top:12px;background:#52f28a;color:#051407;font-size:16px;padding:12px 18px}.confetti{position:absolute;width:10px;height:14px;top:-20px;z-index:25;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.35);animation:fallconf 1.6s linear forwards;pointer-events:none}.sideBtn{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:76px;height:76px;border-radius:22px;font-size:34px;box-shadow:0 10px 26px rgba(0,0,0,.45)}#sideLeft{left:max(10px,calc(50% - min(47vw,34vh) - 96px))}#sideRight{right:max(10px,calc(50% - min(47vw,34vh) - 96px))}#pixelBg{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.72}.pxshape{position:absolute;width:96px;height:96px;image-rendering:pixelated;opacity:.45;animation:drift 9s ease-in-out infinite}.pxshape svg{width:100%;height:100%;border:0;background:transparent;box-shadow:none}.pxshape:nth-child(2){animation-duration:12s;animation-delay:-3s}.pxshape:nth-child(3){animation-duration:10s;animation-delay:-5s}.pxshape:nth-child(4){animation-duration:14s;animation-delay:-1s}.pxshape:nth-child(5){animation-duration:11s;animation-delay:-7s}@keyframes drift{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(18px,-12px) rotate(4deg)}50%{transform:translate(-10px,16px) rotate(-3deg)}75%{transform:translate(12px,8px) rotate(2deg)}}@keyframes fallconf{from{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}to{transform:translateY(88vh) rotate(900deg) scale(.8);opacity:0}}.heart{position:absolute;z-index:18;font-size:22px;pointer-events:none;animation:heartfloat 1.25s ease-out forwards;text-shadow:0 2px 0 #000}@keyframes heartfloat{from{transform:translate(-50%,0) scale(.8);opacity:1}to{transform:translate(-50%,-85px) scale(1.35);opacity:0}}.bigHeart{position:absolute;z-index:22 label{background:#22263a;padding:8px;border-radius:10px;font-weight:900}
#levelName{width:120px}.smallBtn{padding:6px 8px;font-size:11px}

#levelBadge{

  top:10px;

  transform:translateX(-50%);
  z-index:6;

/* Compagnon façon mockup : grosse bande basse, mais passable */
#companionDock{
  position:fixed;
  left:50%;
  bottom:calc(78px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  width:min(1040px,calc(100vw - 24px));
  min-height:96px;
  z-index:40;
  display:grid;
  grid-template-columns:92px 1fr auto;
  gap:18px;
  align-items:center;
  padding:14px 18px;
  background:linear-gradient(180deg,rgba(9,10,22,.78),rgba(7,8,17,.90));
  border-top:1px solid rgba(255,255,255,.08);
  box-shadow:0 -18px 45px rgba(0,0,0,.36);
  backdrop-filter:blur(4px);
}
#companionDock.hidden{
  display:none!important;
}
#companionAvatar{
  position:relative;
  width:68px;
  height:68px;
  background:#f1c453;
  border:5px solid #6b3f00;
  box-shadow:inset 0 6px 0 rgba(255,255,255,.17),5px 5px 0 rgba(255,255,255,.16);
  image-rendering:pixelated;
}
#companionAvatar .eye{
  position:absolute;
  top:20px;
  width:15px;
  height:15px;
  background:#fff;
  border:3px solid #333;
}
#companionAvatar .eyeL{left:16px}
#companionAvatar .eyeR{right:16px}
#companionAvatar .pupil{
  position:absolute;
  top:26px;
  width:4px;
  height:4px;
  background:#111;
  animation:pixLook 3.2s ease-in-out infinite;
}
#companionAvatar .pupilL{left:23px}
#companionAvatar .pupilR{right:23px}
#companionText{
  color:#f5f6ff;
  font-size:clamp(16px,1.8vw,24px);
  line-height:1.28;
  text-shadow:0 2px 0 #000;
}
#companionSkip{
  background:#252a4a;
  color:#eef2ff;
  border:1px solid rgba(145,155,230,.35);
  border-radius:14px;
  padding:10px 14px;
  font-weight:900;
}
#companionHelp{
  position:fixed;
  right:14px;
  bottom:calc(92px + env(safe-area-inset-bottom));

  height:42px;
  border-radius:14px;
  background:#252a4a;
  color:#fff;
  border:1px solid rgba(145,155,230,.35);
  font-size:22px;
  font-weight:900;
}
@keyframes pixLook{
  0%,100%{transform:translateX(0)}
  35%{transform:translateX(3px)}
  70%{transform:translateX(-3px)}
}
@media (max-width:700px){

/* ===== V41 tip/editor/global scale fixes ===== */

/* Échelle commune : top, plateau, boutons et tips suivent ensemble. */
:root{--uiScale:1}

#top{
  min-height:calc(112px * var(--uiScale))!important;
  max-height:calc(112px * var(--uiScale))!important;
  padding:calc(14px * var(--uiScale)) calc(12px * var(--uiScale)) calc(8px * var(--uiScale))!important;
}
#title{
  font-size:calc(clamp(26px,3.9vw,54px) * var(--uiScale))!important;
}
#playStats{
  top:calc(64px * var(--uiScale))!important;
}
.objectiveLine .metric{
  padding:calc(10px * var(--uiScale)) calc(12px * var(--uiScale))!important;
  gap:calc(9px * var(--uiScale))!important;
}
.objectiveLine .metric i{font-size:calc(20px * var(--uiScale))!important}
.objectiveLine .metric small{font-size:calc(12px * var(--uiScale))!important}
.objectiveLine .metric b{font-size:calc(20px * var(--uiScale))!important}

.boardWrap{
  padding:calc(10px * var(--uiScale))!important;
}
svg{
  width:min(calc(88vw * var(--uiScale)),calc(62vh * var(--uiScale)))!important;
  height:min(calc(88vw * var(--uiScale)),calc(62vh * var(--uiScale)))!important;
}

/* Boutons : suivent l'échelle, ne mangent plus l'écran quand la fenêtre diminue. */
#controls{
  gap:calc(16px * var(--uiScale))!important;
  padding:calc(14px * var(--uiScale)) calc(12px * var(--uiScale)) calc((14px * var(--uiScale)) + env(safe-area-inset-bottom))!important;
  width:min(calc(700px * var(--uiScale)),95vw)!important;
}
#controls .bottomTurn{
  min-width:calc(160px * var(--uiScale))!important;
  max-width:calc(220px * var(--uiScale))!important;
  padding:calc(18px * var(--uiScale)) calc(16px * var(--uiScale))!important;
  font-size:calc(48px * var(--uiScale))!important;
  border-radius:calc(18px * var(--uiScale))!important;
}
#reset{
  min-width:calc(124px * var(--uiScale))!important;
  padding:calc(16px * var(--uiScale)) calc(22px * var(--uiScale))!important;
  font-size:calc(13px * var(--uiScale))!important;
}
#reset::before{
  font-size:calc(28px * var(--uiScale))!important;
}

/* Tips : revient au comportement d'avant, pas une barre permanente collée au bas. */
#companionDock{
  bottom:calc((88px * var(--uiScale)) + env(safe-area-inset-bottom))!important;
  width:min(calc(760px * var(--uiScale)),calc(100vw - 24px))!important;

}

<script>
const W=13,H=13,T=40;
const grid=document.getElementById("grid"),rot=document.getElementById("rot"),stage=document.getElementById("stage"),svg=document.querySelector("svg");
const modeLabel=document.getElementById("modeLabel"),status=document.getElementById("status"),tool=document.getElementById("tool");
const editPanel=document.getElementById("editPanel"),levelNameInput=document.getElementById("levelName"),playStats=document.getElementById("playStats");
const banner=document.getElementById("banner"),bannerTitle=document.getElementById("bannerTitle"),bannerText=document.getElementById("bannerText"),starsEl=document.getElementById("stars"),bannerAction=document.getElementById("bannerAction");

let levels=[];
let gameSettings={fallDelayMs:135,rotationDurationMs:320};
let fallbackLevels=[]; // V57: aucun niveau de gameplay en dur. levels.json est obligatoire.

let currentLevel=0,baseMap=[],b=[],p={x:0,y:0},start={x:0,y:0},exit={x:0,y:0};
let door=false,busy=false,edit=false,moves=0,gameOver=false,confettiTimer=null,deadPlayer=false,idleTick=0,painting=false,lastPaintKey='',visualOri=0,squash=0,soundOn=true,audioCtx=null,rotatorCooldown=false;

function E(n,a){let e=document.createElementNS("http://www.w3.org/2000/svg",n);for(let k in a)e.setAttribute(k,a[k]);return e}
function rect(x,y,w,h,f,s,sw=4){grid.appendChild(E("rect",{x,y,width:w,height:h,fill:f,stroke:s,"stroke-width":sw,"pointer-events":"none"}))}
function text(x,y,t,f,sz=22){let a=E("text",{x,y,fill:f,"font-size":sz,"font-weight":900,"text-anchor":"middle","font-family":"monospace","pointer-events":"none"});a.textContent=t;grid.appendChild(a)}

/* ===== V51 ASSET RUNTIME ===== */
let assetPack=null;

async function loadAssets(){
  // V57 : assets.json externe obligatoire en priorité, mais on teste plusieurs chemins.
  // Aucun asset gameplay n'est embarqué ici : si assets.json manque, on tombe seulement sur les fallbacks graphiques codés.
  const candidates=["./assets.json","assets.json","/assets.json"];
  let lastErr=null;
  for(const path of candidates){
    try{
      const url=path+"?cacheBust="+Date.now();
      console.log("[ASSETS] tentative", url);
      const res=await fetch(url,{cache:"no-store"});
      if(!res.ok)throw new Error("HTTP "+res.status+" sur "+path);
      const data=await res.json();
      if(!data || !data.assets || !data.palette)throw new Error("assets.json invalide : assets/palette manquants");
      assetPack=data;
      console.log("[ASSETS] OK depuis", path, Object.keys(assetPack.assets||{}));
      return true;
    }catch(e){
      lastErr=e;
      console.warn("[ASSETS] échec", path, e);
    }
  }
  assetPack=null;
  console.error("[ASSETS] ECHEC assets.json après tous les chemins", lastErr);
  return false;
}

function getAssetPixels(name){
  if(!assetPack || !assetPack.assets)return null;
  const a=assetPack.assets[name];
  if(Array.isArray(a))return a;
  if(a && Array.isArray(a.pixels))return a.pixels;
  return null;
}

function drawPixelAsset(name,x,y,parent=grid,opts={}){
  const pixels=getAssetPixels(name);
  if(!pixels || !pixels.length)return false;

  const pal=(assetPack && assetPack.palette) ? assetPack.palette : {};
  const size=assetPack.assetSize || pixels.length || 16;
  const scale=T/size;
  const alpha=opts.alpha==null ? 1 : opts.alpha;

  const anim=assetPack && assetPack.animation;
  const shouldEyeShift=anim && anim.enabled && Array.isArray(anim.eyeShiftAssets) && anim.eyeShiftAssets.includes(name);
  let eyeShift=0;
  if(shouldEyeShift){
    const seq=anim.eyeShiftPixels || [0,1,0,-1];
    const interval=anim.eyeShiftIntervalMs || 420;
    eyeShift=seq[Math.floor(Date.now()/interval)%seq.length] || 0;
  }

  for(let py=0;py<pixels.length;py++){
    const row=String(pixels[py]||"");
    for(let px=0;px<row.length;px++){
      const key=row[px];
      let col=pal[key];
      if(!col || col==="transparent")continue;

      let dx=0;
      if(shouldEyeShift && key==="0" && py>=3 && py<=8){
        dx=eyeShift;
        const targetX=px+dx;
        if(targetX<0 || targetX>=row.length) dx=0;
      }

      parent.appendChild(E("rect",{
        x:x+(px+dx)*scale,
        y:y+py*scale,
        width:Math.ceil(scale),
        height:Math.ceil(scale),
        fill:col,
        opacity:alpha,
        "pointer-events":"none"
      }));
    }
  }
  return true;
}

function arr(map){return map.map(r=>r.split(""))}
function map(){return baseMap.map(r=>r.join(""))}

function normalize(){
  let foundA=false,foundB=false;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    if(baseMap[y][x]=="A"){if(foundA)baseMap[y][x]=".";foundA=true;start={x,y}}
    if(baseMap[y][x]=="B"){if(foundB)baseMap[y][x]=".";foundB=true;exit={x,y}}
  }
  if(!foundA){baseMap[1][1]="A";start={x:1,y:1}}
  if(!foundB){baseMap[H-2][W-2]="B";exit={x:W-2,y:H-2}}
}

function clampNum(v,min,max,fallback){
  v=parseInt(v,10);
  if(!Number.isFinite(v))return fallback;
  return Math.max(min,Math.min(max,v));
}
function getFallDelayMs(){
  return clampNum(gameSettings.fallDelayMs,60,500,135);
}
function getRotationDurationMs(){
  return clampNum(gameSettings.rotationDurationMs,120,1000,320);
}
function syncSpeedInputs(){
  const f=document.getElementById("fallDelayInput");

function beep(freq=440,dur=.08,type="square",gain=.04){
  const ac=ensureAudio(); if(!ac)return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(gain,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+dur);
}

function validateVectorAssetsData(data){
  if(!data || !data.assets)throw new Error("vector_assets.json invalide : assets manquant");
  const required=["player","destination","button_off","button_on","block_up","block_down","wall","danger","rotator_left","rotator_right"];
  const missing=required.filter(k=>!data.assets[k]);
  if(missing.length)throw new Error("vector_assets.json incomplet : "+missing.join(", "));
  return true;
}

async function loadVectorAssets(){
  const candidates=["./vector_assets.json","vector_assets.json","/vector_assets.json"];
  let lastErr=null;
  setVectorStatus("SVG loading...\\nexpected 3563ce4af1","");
  for(const path of candidates){
    try{
      const url=path+"?cacheBust="+Date.now();
      console.log("[VECTOR_ASSETS] tentative",url);
      const res=await fetch(url,{cache:"no-store"});
      if(!res.ok)throw new Error("HTTP "+res.status+" sur "+path);
      const data=await res.json();
      validateVectorAssetsData(data);
      vectorAssetPack=data;
      window.__vectorAssetsLoadedFrom=path;
      window.__vectorDrawCount=0;
      const counts=Object.entries(data.assets).map(([k,v])=>k+":"+(v.layers?v.layers.length:0)).join(" | ");
      console.log("[VECTOR_ASSETS] OK",path,counts);
      setVectorStatus("SVG ON\\n"+path+"\\nplayer:"+(data.assets.player.layers||[]).length+" layers\\nexpected:3563ce4af1","ok");
      return true;
    }catch(e){
      lastErr=e;
      console.warn("[VECTOR_ASSETS] échec",path,e);
    }
  }
  vectorAssetPack=null;
  window.__vectorAssetsLoadedFrom=null;
  setVectorStatus("SVG OFF\\nvector_assets.json introuvable","bad");
  showVectorAssetsError(lastErr);
  throw lastErr || new Error("vector_assets.json introuvable");
}
function vectorAsset(name){return vectorAssetPack&&vectorAssetPack.assets?vectorAssetPack.assets[name]:null}
function vectorAnimTransform(l,t){
  const a=l.anim;if(!a||!a.type)return "";
  const speed=Number(a.speed??0.004), amp=Number(a.amp??1), ampX=Number(a.ampX??amp);
  const s=Math.sin(t*speed);
  if(a.type==="look")return `translate(${s*ampX} 0)`;
  if(a.type==="bob")return `translate(0 ${s*amp})`;
  if(a.type==="shake")return `translate(${Math.sin(t*speed*5)*amp} ${Math.cos(t*speed*7)*amp})`;
  if(a.type==="spin"){const cx=(Number(l.x)||20)+((Number(l.w)||0)/2), cy=(Number(l.y)||20)+((Number(l.h)||0)/2);return `rotate(${s*amp} ${cx} ${cy})`;}
  if(a.type==="pulse"){const cx=Number(l.x??20), cy=Number(l.y??20), sc=1+s*amp;return `translate(${cx} ${cy}) scale(${sc}) translate(${-cx} ${-cy})`;}
  return "";
}
function vectorAnimOpacity(l,t){
  const a=l.anim;if(!a||a.type!=="blink")return l.opacity??1;
  return Math.sin(t*Number(a.speed??0.006))>0?1:0.2;
}
function appendVectorLayer(parent,l,t){
  let el; const shape=l.shape||"rect";
  if(shape==="circle"){
    el=E("circle",{cx:l.x??20,cy:l.y??20,r:l.r??8});
  }else if(shape==="polygon"){
    const pts=(l.points||[]).map(p=>Array.isArray(p)?p.join(","):p).join(" ");
    el=E("polygon",{points:pts});
  }else if(shape==="text"){
    el=E("text",{x:l.x??20,y:l.y??20,"font-size":l.fontSize??12,"font-weight":900,"font-family":"monospace","text-anchor":"middle"});
    el.textContent=l.text??"?";

    el=E("rect",{x:l.x??0,y:l.y??0,width:l.w??10,height:l.h??10,rx:l.rx??0,ry:l.rx??0});
  }
  el.setAttribute("fill",l.fill??"transparent");
  el.setAttribute("stroke",l.stroke??"transparent");
  el.setAttribute("stroke-width",l.strokeWidth??0);
  el.setAttribute("opacity",vectorAnimOpacity(l,t));

}
function drawVectorAsset(name,X,Y,parent=grid,opts={}){

function wrapX(x){ return x<0 ? W-1 : (x>=W ? 0 : x); }
function wrapY(y){ return y<0 ? H-1 : (y>=H ? 0 : y); }
function isDeathTile(x,y){ return b[y] && b[y][x] === "X"; }
function isRotatorTile(x,y){ return b[y] && (b[y][x] === "R" || b[y][x] === "L"); }
function rotatorDir(x,y){ return b[y][x] === "R" ? 1 : -1; }

function autoRotateFromTile(dir){
  busy=true;
  rotatorCooldown=true;
  const dur=getRotationDurationMs();
  const interval=16;
  const step=Math.max(2,90/(dur/interval));
  let a=0,target=dir*90;
  let timer=setInterval(()=>{
    a+=dir*step;
    rot.setAttribute("transform","rotate("+a+" 260 260)");
    if(Math.abs(a)>=Math.abs(target)){
      clearInterval(timer);
      rot.setAttribute("transform","rotate(0 260 260)");
      apply(dir);
      draw();
      setTimeout(()=>fall(),getFallDelayMs());
    }
  },interval);
}

function triggerDeathTile(){
  gameOver=true;
  deadPlayer=true;
  status.textContent="Mort : case ☠.";
  soundCrash();
  dissolvePlayer();
  draw();
  showBanner("MORT ☠","La tronche de la mort t'a pulvérisé.", "☆☆☆","lose");
  busy=false;
}

function fall(){
  if(edit||gameOver)return;
  let dist=0;
  let safety=0;

  const step=()=>{
    if(edit||gameOver){busy=false;return}
    if(safety++>160){
      busy=false;
      status.textContent="Boucle stoppée pour sécurité.";
      return;
    }

    touchSwitch();

    if(isDeathTile(p.x,p.y)){
      triggerDeathTile();
      return;
    }

    // Rotateur : se déclenche une seule fois tant que le cube n’a pas quitté la case.
    // Sinon il tourne en boucle comme une IA junior en panique. Non merci.
    if(isRotatorTile(p.x,p.y) && !rotatorCooldown){
      const d=rotatorDir(p.x,p.y);
      status.textContent=d>0 ? "Rotateur droite activé." : "Rotateur gauche activé.";
      autoRotateFromTile(d);
      return;
    }

    let nx=wrapX(p.x);
    let ny=wrapY(p.y+1);

    if(!solid(nx,ny)){
      const oldKey=p.x+","+p.y;
      p.y=ny;
      p.x=nx;
      const newKey=p.x+","+p.y;
      if(newKey!==oldKey)rotatorCooldown=false;
      dist++;
      draw();
      setTimeout(step,getFallDelayMs());
    }else{
      touchSwitch();
      shake(dist);
      soundLand(dist);
      squash=Math.min(1,0.25+dist*.11);
      setTimeout(()=>{squash=0;draw()},130);
      gravelFx(dist);
      draw();
      busy=false;
      if(p.x==exit.x&&p.y==exit.y){
        gameOver=true;
        let s=starScore();
        let stars="♥".repeat(s)+"♡".repeat(3-s);
        status.textContent="Niveau gagné.";
        soundLove();
        soundWin();
        bigHeart();
        floatingHearts();
        startConfetti();
        saveWinProgress();
        if(currentLevel>=49 || currentLevel===levels.length-1){
          showBanner(
            "DESTINÉE VALIDÉE 💖",
            "Vous avez terminé les 50 niveaux. Votre date a enfin fonctionné. Il n’y a plus qu’à tenir les 3 prochaines années pour passer le cap. Tout au long du jeu, vous avez réussi à rencontrer différentes personnes, mais rien n’avait vraiment abouti. Cette fois, la dernière était la bonne — ou le bon.",
            "💖 🌸 💋 ⭐ 💐",
            "final"
          );
        }else{
          showBanner("DESTINÉE RETROUVÉE","« "+levels[currentLevel].name+" » · "+moves+" coups · objectif 3♥ : "+levels[currentLevel].maxMoves,stars,"win");
        }
      }
    }
  };
  step();
}

function simFall(state){
  let {map,p}=state; let steps=0; let switchesHit=0;
  const isBlock=(c)=>c=="#"||c=="D";
  const out=(x,y)=>x<0||y<0||x>=W||y>=H;
  const sol=(x,y)=>out(x,y)||isBlock(map[y][x]);
  while(true){
    if(map[p.y]&&map[p.y][p.x]=="S"){
      switchesHit++;
      if(switchesHit>8)return {dead:true};
      map=map.map(r=>r.map(c=>c=="D"?"O":c=="O"?"D":c));
    }
    let nx=p.x,ny=p.y+1;
    if(out(nx,ny))return {dead:true};
    if(!sol(nx,ny)){p={x:nx,y:ny};steps++; if(steps>80)return {dead:true}; continue;}
    if(map[p.y]&&map[p.y][p.x]=="S"){
      switchesHit++;
      if(switchesHit>8)return {dead:true};
      map=map.map(r=>r.map(c=>c=="D"?"O":c=="O"?"D":c));
    }
    return {map,p,dead:false};
  }
}
function simRotate(state,d){
  let map=state.map,p=state.p,ex=state.exit;
  const rcw=(m)=>{let o=Array.from({length:H},()=>Array(W).fill("."));for(let y=0;y<H;y++)for(let x=0;x<W;x++)o[x][H-1-y]=m[y][x];return o};
  const rccw=(m)=>{let o=Array.from({length:H},()=>Array(W).fill("."));for(let y=0;y<H;y++)for(let x=0;x<W;x++)o[W-1-x][y]=m[y][x];return o};
  const qcw=(q)=>({x:H-1-q.y,y:q.x}), qccw=(q)=>({x:q.y,y:W-1-q.x});
  if(d>0){map=rcw(map);p=qcw(p);ex=qcw(ex)} else {map=rccw(map);p=qccw(p);ex=qccw(ex)}
  return simFall({map,p,exit:ex});
}
function stateKey(s){return s.p.x+","+s.p.y+"|"+s.exit.x+","+s.exit.y+"|"+s.map.map(r=>r.join("")).join("")}
function calcMoves(){
  try{
    writeCurrentLevel();
    let raw=arr(levels[currentLevel].map);
    let pts=solverFindPoints(raw);
    let start=solverFall({m:raw,p:pts.p,ex:pts.ex});
    const maxDepth=32;
    if(start.dead){
      levels[currentLevel].maxMoves=999;
      status.innerHTML='<span class="testBad">Calc coups : impossible dès le départ ('+start.reason+').</span>';
      updateStats();
      return;
    }
    let q=[{...start,path:[]}];
    let seen=new Set([solverKey(start)]);
    while(q.length){
      let s=q.shift();
      if(s.p.x==s.ex.x && s.p.y==s.ex.y){
        levels[currentLevel].maxMoves=s.path.length;
        levels[currentLevel].solution=s.path.map(d=>d>0?'R':'L').join('');
        updateStats();
        status.innerHTML='<span class="testOk">Calc coups : objectif 3♥ = '+s.path.length+' coup(s). Solution : '+(levels[currentLevel].solution||'déjà sur la sortie')+'</span>';
        return;
      }
      if(s.path.length>=maxDepth)continue;
      for(let d of [-1,1]){
        let n=solverRotate(s,d);
        if(n.dead)continue;
        let k=solverKey(n);
        if(!seen.has(k)){
          seen.add(k);
          q.push({...n,path:s.path.concat(d)});
        }
      }
    }
    levels[currentLevel].maxMoves=999;
    updateStats();
    status.innerHTML='<span class="testBad">Calc coups : aucune solution trouvée jusqu’à '+maxDepth+' coups.</span>';
  }catch(e){
    console.error('[CALC] erreur',e);
    status.innerHTML='<span class="testBad">Calc coups : erreur JS - '+(e.message||e)+'</span>';
  }
}

function cloneGrid(m){ return m.map(r=>r.slice ? r.slice() : r.split("")); }
function solverFindPoints(m){
  let p={x:0,y:0}, ex={x:0,y:0};
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    if(m[y][x]=="A"){p={x,y};m[y][x]="."}
    if(m[y][x]=="B"){ex={x,y}}
  }
  return {p,ex};
}
function solverBlock(c){ return c=="#" || c=="D"; }
function solverWrapX(x){ return x<0?W-1:(x>=W?0:x); }
function solverWrapY(y){ return y<0?H-1:(y>=H?0:y); }
function solverCw(m){
  let o=Array.from({length:H},()=>Array(W).fill("."));
  for(let y=0;y<H;y++)for(let x=0;x<W;x++)o[x][H-1-y]=m[y][x];
  return o;
}
function solverCcw(m){
  let o=Array.from({length:H},()=>Array(W).fill("."));
  for(let y=0;y<H;y++)for(let x=0;x<W;x++)o[W-1-x][y]=m[y][x];
  return o;
}
function solverPcw(q){return{x:H-1-q.y,y:q.x}}
function solverPccw(q){return{x:q.y,y:W-1-q.x}}
function solverToggleDoors(m){
  return m.map(row=>row.map(c=>c=="D"?"O":c=="O"?"D":c));
}
function solverFall(state){
  let m=cloneGrid(state.m), p={...state.p}, ex={...state.ex};
  let safety=0, rotCooldown=false;
  while(true){
    if(safety++>180)return {dead:true, reason:"boucle pendant la chute"};
    let c=m[p.y][p.x];

    if(c=="X")return {dead:true, reason:"mort"};
    if(c=="S"){ m=solverToggleDoors(m); }

    if((c=="R"||c=="L") && !rotCooldown){
      let d=c=="R"?1:-1;
      if(d>0){m=solverCw(m); p=solverPcw(p); ex=solverPcw(ex);}
      else{m=solverCcw(m); p=solverPccw(p); ex=solverPccw(ex);}
      rotCooldown=true;
      continue;
    }

    let nx=solverWrapX(p.x), ny=solverWrapY(p.y+1);
    if(!solverBlock(m[ny][nx])){
      let old=p.x+","+p.y;
      p={x:nx,y:ny};
      if((p.x+","+p.y)!==old)rotCooldown=false;
      continue;
    }

    return {dead:false,m,p,ex};
  }
}
function solverRotate(state,d){
  let m=cloneGrid(state.m), p={...state.p}, ex={...state.ex};
  if(d>0){m=solverCw(m); p=solverPcw(p); ex=solverPcw(ex);}
  else{m=solverCcw(m); p=solverPccw(p); ex=solverPccw(ex);}
  return solverFall({m,p,ex});
}
function solverKey(s){
  return s.p.x+","+s.p.y+"|"+s.ex.x+","+s.ex.y+"|"+s.m.map(r=>r.join("")).join("");
}
function testCurrentLevel(){
  try{
    writeCurrentLevel();
    let raw=arr(levels[currentLevel].map);
    let pts=solverFindPoints(raw);
    let start=solverFall({m:raw,p:pts.p,ex:pts.ex});
    const maxDepth=32;

    if(start.dead){
      status.innerHTML='<span class="testBad">Test du jeu : impossible dès le départ ('+start.reason+').</span>';
      return;
    }

    let q=[{...start,path:[]}];
    let seen=new Set([solverKey(start)]);

    while(q.length){
      let s=q.shift();
      if(s.p.x==s.ex.x && s.p.y==s.ex.y){
        const path=s.path.map(d=>d>0?"↻":"↺").join(" ");
        levels[currentLevel].maxMoves=s.path.length;
        levels[currentLevel].solution=s.path.map(d=>d>0?'R':'L').join('');
        updateStats();
        status.innerHTML='<span class="testOk">Test du jeu : OK, finissable en '+s.path.length+' coup(s). Solution : '+(path||"déjà sur la sortie")+'</span>';
        return;
      }
      if(s.path.length>=maxDepth)continue;
      for(let d of [-1,1]){
        let n=solverRotate(s,d);
        if(n.dead)continue;
        let k=solverKey(n);
        if(!seen.has(k)){
          seen.add(k);
          q.push({...n,path:s.path.concat(d)});
        }
      }
    }

    status.innerHTML='<span class="testBad">Test du jeu : aucune solution trouvée jusqu’à '+maxDepth+' coups. Niveau probablement bloquant.</span>';
  }catch(e){
    console.error('[TEST] erreur',e);
    status.innerHTML='<span class="testBad">Test du jeu : erreur JS - '+(e.message||e)+'</span>';
  }
}

  const pr=loadProgress();
  const stars=starScore();
  const best=pr.best||{};
  const old=best[currentLevel];
  if(!old || moves<old.moves || stars>old.stars){
    best[currentLevel]={moves:moves,stars:stars};
  }
  pr.best=best;

  saveProgress(pr);
}

async function fetchJsonFromCandidates(kind,candidates){
  let lastErr=null;
  for(const path of candidates){
    try{
      const url=path+"?cacheBust="+Date.now();
      console.log("["+kind+"] tentative", url);
      const res=await fetch(url,{cache:"no-store"});
      if(!res.ok)throw new Error("HTTP "+res.status+" sur "+path);
      const data=await res.json();
      console.log("["+kind+"] OK depuis", path);
      return {data,path};
    }catch(e){
      lastErr=e;
      console.warn("["+kind+"] échec", path, e);
    }
  }
  throw lastErr || new Error(kind+" introuvable");
}

function applyLevelsData(data,source){
  gameSettings={...gameSettings,...(data.settings||{})};
  syncSpeedInputs();

  levels=data.levels||data;
  if(!Array.isArray(levels) || !levels.length){
    throw new Error("levels.json chargé depuis "+source+" mais aucun niveau trouvé.");
  }

  levels.forEach(l=>{
    if(!l.biome)l.biome="cosmic";
    if(l.locked===undefined)l.locked=false;
    if(!l.maxMoves)l.maxMoves=999;
    if(!l.difficulty)l.difficulty=1;
  });

  currentLevel=savedStartLevel();
  if(currentLevel>=levels.length)currentLevel=0;

  console.log("[LEVELS] OK source =",source,"|",levels.length,"niveau(x)",levels.map(l=>l.name));
  loadFromLevel(currentLevel);

  status.style.display="block";
  status.textContent="OK : niveaux chargés depuis "+source+" ("+levels.length+" niveau(x)).";
}

function updateGlobalScale(){
  const w=window.innerWidth||document.documentElement.clientWidth||1280;
  const h=window.innerHeight||document.documentElement.clientHeight||720;
  const portrait=w<h;

  // Référence volontairement simple : tout le HUD suit le même coefficient.
  // Desktop large ≈ 1, petites fenêtres/iPhone < 1.
  const refW=portrait ? 390 : 1280;
  const refH=portrait ? 844 : 720;
  const s=Math.max(0.74,Math.min(1,Math.min(w/refW,h/refH)));
  document.documentElement.style.setProperty("--uiScale",s.toFixed(3));
}

(function(){

    window.matchMedia("(display-mode: fullscreen)").matches;

  function showFullscreenHelp(){

  });
  document.addEventListener("webkitfullscreenchange", () => {
    btn.style.display = document.webkitFullscreenElement ? "none" : "";

      const msg="Sur iPhone : bouton Partager → Ajouter à l’écran d’accueil → relance le jeu depuis l’icône pour avoir le vrai plein écran.";
      if(typeof banner!=="undefined" && banner && typeof bannerTitle!=="undefined"){
        bannerTitle.textContent="Plein écran iPhone";
        bannerText.textContent=msg;
        if(typeof starsEl!=="undefined")starsEl.textContent="";
        bannerAction.textContent="OK";
        bannerAction.onclick=()=>banner.classList.add("hidden");
        banner.classList.remove("hidden");
      }else alert(msg);
      return;
    }

    try{
      const target=document.documentElement;
      if(target.requestFullscreen) await target.requestFullscreen({navigationUI:"hide"});
      else if(target.webkitRequestFullscreen) target.webkitRequestFullscreen();
    }catch(e){
      console.warn("[FULLSCREEN]",e);
    }
  }, {capture:true});
})();

</script>
<script>

/* ===== V78 clamp bottom gameplay controls ===== */
(function(){
  function clampControls(){
    const candidates=[...document.querySelectorAll("button")].filter(b=>{
      const t=(b.textContent||"").toLowerCase();
      const id=(b.id||"").toLowerCase();
      const cl=(b.className||"").toString().toLowerCase();
      return t.includes("reset") || id.includes("reset") || cl.includes("reset");
    });
    const reset=candidates[0];
    if(!reset || !reset.parentElement)return;
    const row=reset.parentElement;
    const buttons=[...row.querySelectorAll("button")];
    if(buttons.length<3)return;

    row.style.boxSizing="border-box";
    row.style.maxWidth="100vw";
    row.style.width="100%";
    row.style.paddingLeft="10px";
    row.style.paddingRight="10px";
    row.style.display="grid";
    row.style.gridTemplateColumns="minmax(0,1fr) minmax(74px,.46fr) minmax(0,1fr)";
    row.style.gap="8px";
    row.style.overflow="visible";

    buttons.forEach(b=>{
      b.style.minWidth="0";
      b.style.maxWidth="100%";
      b.style.boxSizing="border-box";
    });
  }
  window.addEventListener("load", clampControls);
  window.addEventListener("resize", clampControls);
  window.addEventListener("orientationchange", clampControls);
  setTimeout(clampControls, 250);
})();

</script>
</body></html>
