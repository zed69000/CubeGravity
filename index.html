<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#070a2a">
<title>Date Cube Gravity</title>
<style>
:root{
  --pink:#ff4fa0;
  --pink2:#ff7dbd;
  --cyan:#29e7ff;
  --white:#f8fbff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 12%,rgba(86,24,110,.65),transparent 35%),
    radial-gradient(circle at 15% 75%,rgba(0,210,255,.24),transparent 35%),
    radial-gradient(circle at 90% 82%,rgba(255,70,160,.22),transparent 34%),
    linear-gradient(180deg,#090b35 0%,#06091f 62%,#020414 100%);
  color:white;
  font-family:Inter,Arial,sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
}
body::before{
  content:"";
  position:fixed;
  inset:-20%;
  pointer-events:none;
  background:
    radial-gradient(circle at 28% 26%,rgba(255,255,255,.11) 0 1px,transparent 2px),
    radial-gradient(circle at 70% 18%,rgba(255,126,190,.16) 0 1px,transparent 2px),
    radial-gradient(circle at 84% 66%,rgba(41,231,255,.14) 0 1px,transparent 2px),
    radial-gradient(circle at 20% 72%,rgba(255,255,255,.10) 0 1px,transparent 2px);
  background-size:120px 120px,170px 170px,150px 150px,210px 210px;
  animation:starDrift 18s linear infinite;
  opacity:.9;
}
@keyframes starDrift{
  from{transform:translate3d(0,0,0)}
  to{transform:translate3d(36px,28px,0)}
}
.floatingHearts{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}
.floatHeart{
  position:absolute;
  bottom:-40px;
  color:rgba(255,105,180,.72);
  font-weight:900;
  text-shadow:0 0 12px rgba(255,79,160,.45),0 5px 12px rgba(0,0,0,.35);
  animation:heartRise var(--dur) linear infinite;
  animation-delay:var(--delay);
  transform:translateX(0) scale(var(--scale));
}
@keyframes heartRise{
  0%{opacity:0;transform:translate3d(0,0,0) scale(var(--scale)) rotate(-12deg)}
  10%{opacity:.85}
  85%{opacity:.7}
  100%{opacity:0;transform:translate3d(var(--drift),-112vh,0) scale(calc(var(--scale) * 1.18)) rotate(18deg)}
}
.mainMenu{
  position:relative;
  width:min(100vw,680px);
  height:100svh;
  min-height:620px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:clamp(18px,4svh,48px) 22px calc(18px + env(safe-area-inset-bottom));
  gap:clamp(12px,2svh,22px);
  z-index:2;
}
.title{
  text-align:center;
  line-height:.9;
  margin-top:-1svh;
  filter:drop-shadow(0 18px 18px rgba(0,0,0,.38));
}
.title .date{
  display:block;
  font-weight:1000;
  font-size:clamp(54px,13vw,102px);
  letter-spacing:.03em;
  color:var(--pink);
  text-shadow:
    0 7px 0 #7d1d54,
    0 0 18px rgba(255,79,160,.55),
    0 0 36px rgba(255,79,160,.25);
}
.title .line{
  display:flex;
  justify-content:center;
  gap:clamp(12px,4vw,30px);
  white-space:nowrap;
}
.title .cube,
.title .gravity{
  display:inline-block;
  font-weight:1000;
  font-size:clamp(45px,10.8vw,86px);
  letter-spacing:.01em;
}
.title .cube{
  color:var(--white);
  text-shadow:0 7px 0 #11162f,0 0 14px rgba(255,255,255,.25);
}
.title .gravity{
  color:var(--cyan);
  text-shadow:0 7px 0 #06385d,0 0 24px rgba(41,231,255,.45);
}
.subtitle{
  margin-top:2px;
  font-size:clamp(20px,4.8vw,31px);
  font-weight:950;
  text-align:center;
  color:#fff2fb;
  text-shadow:0 4px 12px rgba(0,0,0,.38),0 0 12px rgba(255,155,215,.18);
}
.subtitle .dateWord{color:var(--pink2)}
.hero{
  width:min(56vw,340px);
  max-width:360px;
  min-width:220px;
  aspect-ratio:1/1;
  position:relative;
  display:grid;
  place-items:center;
  margin:clamp(2px,1svh,14px) 0 clamp(4px,1svh,12px);
}
.heroGlow{
  position:absolute;
  width:115%;
  height:92%;
  bottom:0;
  border-radius:50%;
  background:radial-gradient(circle at 50% 70%,rgba(255,82,185,.9) 0%,rgba(255,82,185,.34) 35%,transparent 68%);
  filter:blur(18px);
  opacity:.86;
  animation:heroGlowPulse 2.6s ease-in-out infinite;
}
@keyframes heroGlowPulse{
  0%,100%{transform:scale(.96);opacity:.74}
  50%{transform:scale(1.05);opacity:.96}
}
.portal{
  position:absolute;
  bottom:3%;
  width:58%;
  height:8%;
  border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#ffb6df 16%,#ff52b6 44%,rgba(255,82,182,.12) 72%,transparent 100%);
  box-shadow:0 0 32px rgba(255,82,182,.72);
  animation:portalBreath 1.8s ease-in-out infinite;
}
@keyframes portalBreath{
  0%,100%{transform:scaleX(.94);filter:brightness(.92)}
  50%{transform:scaleX(1.08);filter:brightness(1.15)}
}
.heroAssetWrap{
  position:relative;
  width:78%;
  height:78%;
  border-radius:13%;
  display:grid;
  place-items:center;
  filter:
    drop-shadow(0 24px 34px rgba(0,0,0,.38))
    drop-shadow(0 0 18px rgba(255,79,160,.28));
  animation:heroBob 2.2s ease-in-out infinite;
}
@keyframes heroBob{
  0%,100%{transform:translateY(0) rotate(-1deg)}
  50%{transform:translateY(-9px) rotate(1deg)}
}
#playerHeroSvg{
  width:100%;
  height:100%;
  overflow:visible;
}
.fallbackCube{
  width:100%;
  height:100%;
  border-radius:13%;
  background:linear-gradient(180deg,#ffe64f 0%,#ffd233 56%,#edae19 100%);
  box-shadow:
    inset 0 5px 0 rgba(255,255,195,.5),
    inset 0 -10px 0 rgba(143,84,0,.28),
    0 24px 48px rgba(0,0,0,.35),
    0 0 22px rgba(255,81,174,.35);
  position:relative;
  overflow:hidden;
}
.fallbackCube::before{content:"";position:absolute;left:0;top:0;bottom:0;width:15%;background:linear-gradient(180deg,#b36a05,#964900)}
.fallbackCube::after{content:"";position:absolute;left:0;right:0;top:0;height:25%;background:#9f5c06;border-bottom-left-radius:22px;border-bottom-right-radius:22px}
.fallbackEye{position:absolute;top:39%;z-index:3;width:27%;height:27%;border-radius:50%;background:#fff;border:9px solid #452000}
.fallbackEye.left{left:19%}
.fallbackEye.right{right:19%}
.fallbackEye::after{content:"";position:absolute;left:54%;top:52%;transform:translate(-50%,-50%);width:31%;height:31%;border-radius:50%;background:#060606}
.fallbackMouth{position:absolute;left:24%;right:24%;bottom:22%;height:10%;border-radius:999px;background:#8b4a00;border:4px solid #653400}
.assetHidden{display:none}
.buttonStack{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}
.playBtn,.optionBtn{
  position:relative;
  border:0;
  text-decoration:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  color:#fff;
  font-weight:1000;
  letter-spacing:.04em;
  text-shadow:0 3px 0 rgba(0,0,0,.2);
  transition:transform .12s ease,filter .12s ease,box-shadow .12s ease;
  touch-action:manipulation;
}
.playBtn{
  width:min(78vw,430px);
  min-height:78px;
  padding:20px 30px;
  border-radius:33px;
  font-size:clamp(31px,7vw,48px);
  background:linear-gradient(180deg,#ff85c4 0%,#ff4d98 55%,#e73382 100%);
  box-shadow:
    0 0 34px rgba(255,77,152,.38),
    0 15px 30px rgba(0,0,0,.3),
    inset 0 4px 0 rgba(255,255,255,.38),
    inset 0 -6px 0 rgba(143,0,65,.32);
}
.optionBtn{
  width:min(58vw,315px);
  min-height:58px;
  padding:15px 24px;
  border-radius:24px;
  font-size:clamp(20px,4.8vw,30px);
  background:linear-gradient(180deg,#2b2a67 0%,#121a4e 100%);
  box-shadow:
    0 0 24px rgba(140,70,255,.22),
    0 12px 22px rgba(0,0,0,.28),
    inset 0 0 0 2px rgba(139,102,255,.28),
    inset 0 3px 0 rgba(255,255,255,.16),
    inset 0 -5px 0 rgba(0,0,0,.22);
}
.playBtn.isPressed,.optionBtn.isPressed,
.playBtn:active,.optionBtn:active{
  transform:translateY(4px) scale(.975);
  filter:brightness(1.16) saturate(1.08);
}
.playBtn:hover,.optionBtn:hover{filter:brightness(1.06)}
.playBtn::after,.optionBtn::after{
  content:"";
  position:absolute;
  inset:6px 18%;
  border-radius:999px;
  background:linear-gradient(180deg,rgba(255,255,255,.26),transparent);
  opacity:.75;
  pointer-events:none;
}
.iconHeart{font-size:1.08em;filter:drop-shadow(0 2px 0 rgba(0,0,0,.16))}
.iconGear{font-size:1.02em}
.version{
  font-weight:800;
  font-size:clamp(12px,2.5vw,15px);
  letter-spacing:.04em;
  color:rgba(238,245,255,.48);
  text-align:center;
  margin-top:2px;
}
.soundHint{
  position:fixed;
  right:14px;
  bottom:calc(14px + env(safe-area-inset-bottom));
  z-index:4;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,15,45,.42);
  color:rgba(255,255,255,.68);
  border-radius:999px;
  padding:8px 10px;
  font-size:12px;
  font-weight:900;
  backdrop-filter:blur(8px);
}
.optionsOverlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
  background:rgba(0,0,0,.58);
  z-index:10;
}
.optionsOverlay.show{display:flex}
.optionsModal{
  width:min(92vw,390px);
  padding:22px;
  border-radius:26px;
  background:linear-gradient(180deg,#161a4a,#080d2d);
  box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.1);
}
.optionsModal h2{margin:0 0 14px;text-align:center;font-size:30px}
.optionsModal a,.optionsModal button{
  display:block;
  width:100%;
  border:0;
  text-decoration:none;
  margin-top:10px;
  padding:15px 16px;
  border-radius:18px;
  background:#202866;
  color:#fff;
  font-weight:900;
  text-align:center;
  font-size:16px;
}
.optionsModal .creator{background:#141f50}
.optionsModal .soundToggle{background:#263066;cursor:pointer}
.optionsModal .close{background:#34395d;cursor:pointer}
@media(max-height:720px){
  .mainMenu{gap:10px;padding-top:18px;padding-bottom:16px}
  .hero{width:min(44vw,250px);min-width:185px}
  .playBtn{min-height:62px;padding:14px 24px;border-radius:26px}
  .optionBtn{min-height:50px;padding:12px 22px}
}

.heroAssetWrap{opacity:0;transition:opacity .18s ease;}
.heroAssetWrap.assetReady{opacity:1;}

</style>
</head>
<body>
<div class="floatingHearts" aria-hidden="true">
  <span class="floatHeart" style="left:9%;--dur:9s;--delay:-1s;--scale:.8;--drift:38px">♥</span>
  <span class="floatHeart" style="left:22%;--dur:12s;--delay:-5s;--scale:1.15;--drift:-24px">♡</span>
  <span class="floatHeart" style="left:39%;--dur:10s;--delay:-2s;--scale:.7;--drift:18px">💖</span>
  <span class="floatHeart" style="left:63%;--dur:13s;--delay:-7s;--scale:1;--drift:-44px">♥</span>
  <span class="floatHeart" style="left:79%;--dur:11s;--delay:-3s;--scale:.85;--drift:28px">♡</span>
  <span class="floatHeart" style="left:91%;--dur:14s;--delay:-9s;--scale:1.2;--drift:-36px">💗</span>
</div>

<main class="mainMenu">
  <section class="title" aria-label="Date Cube Gravity">
    <span class="date">DATE</span>
    <div class="line">
      <span class="cube">CUBE</span>
      <span class="gravity">GRAVITY</span>
    </div>
  </section>

  <div class="subtitle">À la recherche de son <span class="dateWord">Date</span> !</div>

  <section class="hero" aria-hidden="true">
    <div class="heroGlow"></div>
    <div class="portal"></div>

    <div class="heroAssetWrap">
      <svg id="playerHeroSvg" class="assetHidden" viewBox="0 0 40 40" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="fallbackCube" class="fallbackCube assetHidden">
        <div class="fallbackEye left"></div>
        <div class="fallbackEye right"></div>
        <div class="fallbackMouth"></div>
      </div>
    </div>
  </section>

  <nav class="buttonStack" aria-label="Navigation principale">
    <a class="playBtn jsReactive" href="game.html"><span class="iconHeart">🤍</span><span>JOUER</span></a>
    <button class="optionBtn jsReactive" id="openOptions" type="button"><span class="iconGear">⚙</span><span>OPTIONS</span></button>
    <div class="version">V43.27-mainmenu-polish-audio</div>
  </nav>
</main>

<div class="soundHint" id="soundHint">♪ Menu</div>

<div class="optionsOverlay" id="optionsOverlay" aria-hidden="true">
  <div class="optionsModal" role="dialog" aria-modal="true" aria-labelledby="optionsTitle">
    <h2 id="optionsTitle">Options</h2>
    <a class="jsReactive" href="game.html">Mode joueur</a>
    <a class="creator jsReactive" href="game.html?editor=1">Mode créateur</a>
    <a class="creator jsReactive" href="asset_svg_editor.html">Éditeur d’assets</a>
    <button class="soundToggle jsReactive" id="soundToggle" type="button">♪ Musique menu : ON</button>
    <button class="close jsReactive" id="closeOptions" type="button">Fermer</button>
  </div>
</div>

<script>
const overlay=document.getElementById("optionsOverlay");
const soundToggle=document.getElementById("soundToggle");
const soundHint=document.getElementById("soundHint");

let audioCtx=null;
let menuMusicTimer=null;
let menuMusicOn=true;
let audioUnlocked=false;
let musicStep=0;

function getAudio(){
  if(!menuMusicOn)return null;
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  if(audioCtx.state==="suspended"){
    audioCtx.resume().catch(()=>{});
  }
  audioUnlocked=true;
  return audioCtx;
}

function beep(freq=440,dur=.08,type="sine",gain=.04){
  const ac=getAudio();
  if(!ac)return;
  const o=ac.createOscillator();
  const g=ac.createGain();
  const f=ac.createBiquadFilter();
  o.type=type;
  o.frequency.setValueAtTime(freq,ac.currentTime);
  f.type="lowpass";
  f.frequency.setValueAtTime(1450,ac.currentTime);
  g.gain.setValueAtTime(Math.max(.0001,gain),ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);
  o.connect(f);
  f.connect(g);
  g.connect(ac.destination);
  o.start();
  o.stop(ac.currentTime+dur+.02);
}

function playButtonSound(){
  beep(740,.045,"triangle",.035);
  setTimeout(()=>beep(980,.05,"sine",.018),45);
}

function playOpenSound(){
  beep(420,.07,"triangle",.03);
  setTimeout(()=>beep(640,.08,"sine",.02),70);
}

function playCloseSound(){
  beep(330,.07,"triangle",.025);
}

function startMenuMusic(){
  if(!menuMusicOn || menuMusicTimer)return;
  const ac=getAudio();
  if(!ac)return;
  const bass=[196,196,220,196,174.61,174.61,196,220];
  const melody=[392,440,493.88,440,392,349.23,392,440];
  const tick=()=>{
    if(!menuMusicOn)return;
    const i=musicStep++%melody.length;
    beep(bass[i],.42,"sine",.006);
    setTimeout(()=>beep(melody[i],.16,"triangle",.009),90);
    setTimeout(()=>beep(melody[(i+2)%melody.length],.14,"sine",.0045),260);
  };
  tick();
  menuMusicTimer=setInterval(tick,560);
}

function stopMenuMusic(){
  if(menuMusicTimer){
    clearInterval(menuMusicTimer);
    menuMusicTimer=null;
  }
}

function setMusicState(v){
  menuMusicOn=!!v;
  localStorage.setItem("dcg_menu_music_on",menuMusicOn?"1":"0");
  soundToggle.textContent=menuMusicOn?"♪ Musique menu : ON":"♪ Musique menu : OFF";
  soundHint.textContent=menuMusicOn?"♪ Menu":"♪ Off";
  if(menuMusicOn)startMenuMusic();
  else stopMenuMusic();
}

try{
  const saved=localStorage.getItem("dcg_menu_music_on");
  if(saved!==null)menuMusicOn=saved==="1";
}catch(e){}

setMusicState(menuMusicOn);

["pointerdown","mousedown","touchstart","keydown"].forEach(evt=>{
  window.addEventListener(evt,()=>{
    if(menuMusicOn)startMenuMusic();
  },{once:true,passive:true});
});

document.querySelectorAll(".jsReactive").forEach(el=>{
  const press=()=>{
    el.classList.add("isPressed");
    if(el.tagName!=="A")playButtonSound();
  };
  const release=()=>el.classList.remove("isPressed");
  el.addEventListener("pointerdown",press);
  el.addEventListener("mousedown",press);
  el.addEventListener("touchstart",press,{passive:true});
  el.addEventListener("pointerup",release);
  el.addEventListener("pointercancel",release);
  el.addEventListener("mouseleave",release);
  el.addEventListener("mouseup",release);
  el.addEventListener("touchend",release);
  el.addEventListener("click",()=>{
    if(menuMusicOn)startMenuMusic();
    if(el.tagName==="A")playButtonSound();
  });
});

document.getElementById("openOptions").addEventListener("click",()=>{
  playOpenSound();
  overlay.classList.add("show");
  overlay.setAttribute("aria-hidden","false");
});
document.getElementById("closeOptions").addEventListener("click",()=>{
  playCloseSound();
  overlay.classList.remove("show");
  overlay.setAttribute("aria-hidden","true");
});
soundToggle.addEventListener("click",()=>{
  setMusicState(!menuMusicOn);
});
overlay.addEventListener("click",e=>{
  if(e.target===overlay){
    playCloseSound();
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden","true");
  }
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden","true");
  }
});

const SVG_NS="http://www.w3.org/2000/svg";

function svgEl(tag,attrs={}){
  const e=document.createElementNS(SVG_NS,tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(v!==undefined && v!==null && v!=="") e.setAttribute(k,String(v));
  });
  return e;
}

function layerOpacity(layer){
  if(layer.visible===false)return 0;
  if(layer.opacity===undefined || layer.opacity===null)return 1;
  return Number(layer.opacity);
}

function normalizeStroke(v){
  return (!v || v==="transparent" || v==="rgba(0,0,0,0)") ? "none" : v;
}

function applyCommon(el,layer){
  el.setAttribute("fill",layer.fill || "none");
  el.setAttribute("stroke",normalizeStroke(layer.stroke));
  if(layer.strokeWidth!==undefined)el.setAttribute("stroke-width",String(layer.strokeWidth));
  const op=layerOpacity(layer);
  if(op!==1)el.setAttribute("opacity",String(op));

  const px=Number(layer.pivotX ?? 20);
  const py=Number(layer.pivotY ?? 20);
  const tx=Number(layer.tx ?? 0);
  const ty=Number(layer.ty ?? 0);
  const sx=Number(layer.scaleX ?? 1);
  const sy=Number(layer.scaleY ?? 1);
  const rot=Number(layer.rotation ?? layer.rot ?? 0);
  const transforms=[];
  if(tx||ty)transforms.push(`translate(${tx} ${ty})`);
  if(rot)transforms.push(`rotate(${rot} ${px} ${py})`);
  if(sx!==1 || sy!==1)transforms.push(`translate(${px} ${py}) scale(${sx} ${sy}) translate(${-px} ${-py})`);
  if(transforms.length)el.setAttribute("transform",transforms.join(" "));
  return el;
}

function pointsToString(points){
  return (points||[]).map(p=>`${Number(p[0])},${Number(p[1])}`).join(" ");
}

function makePathD(points){
  if(!points || !points.length)return "";
  const first=points[0];
  let d=`M ${Number(first[0])} ${Number(first[1])}`;
  for(let i=1;i<points.length;i++)d+=` L ${Number(points[i][0])} ${Number(points[i][1])}`;
  return d;
}

function drawLayer(layer){
  if(!layer || layer.visible===false)return null;
  const shape=layer.shape;
  let el=null;

  if(shape==="rect"){
    el=svgEl("rect",{
      x:layer.x ?? 0,
      y:layer.y ?? 0,
      width:layer.w ?? layer.width ?? 1,
      height:layer.h ?? layer.height ?? 1,
      rx:layer.rx ?? 0,
      ry:layer.ry ?? layer.rx ?? 0
    });
  }else if(shape==="circle"){
    el=svgEl("circle",{
      cx:layer.cx ?? layer.x ?? 20,
      cy:layer.cy ?? layer.y ?? 20,
      r:layer.r ?? 1
    });
  }else if(shape==="ellipse"){
    el=svgEl("ellipse",{
      cx:layer.cx ?? layer.x ?? 20,
      cy:layer.cy ?? layer.y ?? 20,
      rx:layer.rx ?? layer.w ?? 1,
      ry:layer.ry ?? layer.h ?? 1
    });
  }else if(shape==="polygon"){
    el=svgEl("polygon",{points:pointsToString(layer.points)});
  }else if(shape==="path"){
    const d=layer.d || makePathD(layer.points);
    if(!d)return null;
    el=svgEl("path",{d});
  }else if(shape==="line"){
    el=svgEl("line",{
      x1:layer.x1 ?? layer.x ?? 0,
      y1:layer.y1 ?? layer.y ?? 0,
      x2:layer.x2 ?? 40,
      y2:layer.y2 ?? 40
    });
  }else if(shape==="text"){
    el=svgEl("text",{
      x:layer.x ?? 20,
      y:layer.y ?? 20,
      "font-size":layer.fontSize ?? 16,
      "font-weight":layer.fontWeight ?? 900,
      "text-anchor":layer.textAnchor ?? "middle",
      "font-family":layer.fontFamily ?? "Arial, sans-serif"
    });
    el.textContent=layer.text || "";
  }

  if(!el)return null;
  return applyCommon(el,layer);
}

async function loadPlayerAsset(){
  const svg=document.getElementById("playerHeroSvg");
  const fallback=document.getElementById("fallbackCube");
  const wrap=document.querySelector(".heroAssetWrap");
  const candidates=[
    "vector_assets_runtime.json",
    "./vector_assets_runtime.json",
    "vector_assets.json",
    "./vector_assets.json",
    "assets.json",
    "./assets.json"
  ];

  for(const path of candidates){
    try{
      const res=await fetch(path+"?v="+Date.now(),{cache:"no-store"});
      if(!res.ok)continue;
      const data=await res.json();
      const player=data?.assets?.player || data?.player;
      const layers=player?.layers;
      if(!Array.isArray(layers) || !layers.length)continue;

      svg.innerHTML="";
      const root=svgEl("g",{});
      layers.forEach(layer=>{
        const el=drawLayer(layer);
        if(el)root.appendChild(el);
      });
      svg.appendChild(root);

      svg.classList.remove("assetHidden");
      fallback.classList.add("assetHidden");
      wrap && wrap.classList.add("assetReady");
      console.log("[MAINMENU] player asset loaded from",path);
      return;
    }catch(err){
      console.warn("[MAINMENU] player asset failed",path,err);
    }
  }

  fallback.classList.remove("assetHidden");
  wrap && wrap.classList.add("assetReady");
  console.warn("[MAINMENU] fallback cube used");
}

loadPlayerAsset();
</script>
